name: "[TODO: Agent Name] Agent"

on:
  workflow_call:
    inputs:
      # TODO: Define inputs your agent needs. Examples:
      pr_number:
        description: "Pull request number to process"
        required: false
        type: number
      repository:
        description: "Repository in owner/repo format"
        required: true
        type: string
      trigger_context:
        description: "JSON string with event-specific context for the agent"
        required: false
        type: string
        default: "{}"
    outputs:
      # TODO: Define outputs your agent produces. Examples:
      agent_result:
        description: "JSON string with agent output/findings"
        value: ${{ jobs.run-agent.outputs.agent_result }}
      status:
        description: "Agent run status: success | skipped | error"
        value: ${{ jobs.run-agent.outputs.status }}

# Minimal required permissions — expand only as needed for this agent
