name: Check GH_PACKAGES_PAT Expiry

on:
  # 1st and 15th of every month at 09:00 UTC
  schedule:
    - cron: "0 9 1,15 * *"

  # allow manual trigger for ad-hoc checks
  workflow_dispatch:

jobs:
  check:
    name: Check GH_PACKAGES_PAT expiry
    runs-on: ubuntu-slim

    # No GitHub Environment — uses repo-level secrets only
    # No secrets are required for check mode — it reads pat_expiry from the registry file

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Check PAT expiry
        run: python scripts/rotate_gh_pat.py check
        # Exits non-zero if pat_expiry is within 14 days (or already expired).
        # A failed step causes the workflow to fail, which triggers a GitHub
        # Actions failure notification email to the repo owner.
        #
        # When this fails:
        #   1. Go to github.com/settings/tokens → create a new fine-grained PAT
        #      named "kdf-packages-read" with contents:read on kriegerdataforge-python-sdk.
        #   2. Store it as GH_PACKAGES_PAT_NEW in kriegerdataforge-cicd repo secrets.
        #   3. Trigger the "Distribute GH_PACKAGES_PAT" workflow.
        #   4. Update pat_expiry in scripts/gh_pat_registry.json and commit.
