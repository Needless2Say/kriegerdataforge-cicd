name: E2E · Full-stack OIDC journey (compose)

# Runs the Tier-2 Playwright OIDC login journey against the REAL ecosystem stack,
# built from source by e2e/ci_stack.py + e2e/docker-compose.e2e.yml.
#
# Two ways to run:
#   * workflow_dispatch — manual, OWNER-GATED (it checks out four sibling PRIVATE
#     repos and mints an App token, so it is heavy + privileged; same fail-closed
#     pattern every App/CICD_PAT workflow uses via _authorize-owner.yml).
#   * workflow_call — the app repos call this as a (dormant) PR merge gate; the
#     owner-gate is skipped because the caller repo controls who can run its PRs.
#     See e2e/README.md → "Promoting the E2E to a merge gate" for how to enable.
#
# The stack + driver are proven end-to-end LOCALLY (make e2e-ci: build -> up ->
# migrate both DBs -> seed -> Playwright ~13s) and GREEN on a runner (first
# owner dispatch). It wraps that same driver.
#
# Layout: every repo is checked out as a SIBLING under $GITHUB_WORKSPACE so the
# compose build contexts (../../<repo>, relative to e2e/) resolve exactly as they
# do in a local workspace.

on:
  workflow_dispatch:
    inputs:
      journey:
        description: "Which journey to run"
        type: choice
        options: [all, fitness, tiffanys, auth]
        default: all
  # Reusable: app repos call this as a (dormant) PR merge gate. Callers pass
  # their secrets with `secrets: inherit` (needs KDF_APP_ID/KDF_APP_PRIVATE_KEY)
  # and a `journey` (fitness repos → fitness, tiffanys repos → tiffanys, the
  # shared hub/auth-UI → all).
  workflow_call:
    inputs:
      journey:
        description: "all | fitness | tiffanys — which tenant journey to run"
        type: string
        default: all

permissions:
  contents: read

concurrency:
  group: e2e-compose-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fail closed on MANUAL runs: only the repo owner may dispatch this
  # App-token/CICD_PAT workflow (this repo is public). A workflow_call from a
  # trusted caller repo (the merge gate) skips this gate — that repo's own
  # branch-protection controls who can open PRs that trigger it.
  authorize:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_authorize-owner.yml

  e2e:
    name: Full-stack OIDC E2E
    needs: authorize
    # Run when called as a reusable gate, OR when the owner-gate passed on dispatch.
    # always() lets this evaluate even though `authorize` is skipped on a call.
    if: >-
      always() &&
      (github.event_name == 'workflow_call' ||
       (needs.authorize.result == 'success' && needs.authorize.outputs.authorized == 'true'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      # CI headroom over the driver's local defaults (slower cold builds + compiles).
      E2E_BUILD_TIMEOUT: "2400"
      E2E_WAIT_TIMEOUT: "600"
      # Playwright login creds — the deterministic user ci_stack.py seeds.
      E2E_USERNAME: e2e-user
      E2E_PASSWORD: E2eTest123!

    steps:
      - name: Free disk space for four image builds
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          df -h /

      # This repo standardized on GitHub App auth (USE_GITHUB_APP=true); the legacy
      # CICD_PAT is retired/expired. Mint a short-lived, least-privilege token
      # (contents:read, scoped to just the repos this run touches) and use it BOTH
      # for the private sibling checkouts AND as the SDK-clone credential in the
      # image build. Falls back to CICD_PAT only if the App flag is ever turned off.
      - name: Mint GitHub App token (contents:read on the siblings + SDK)
        id: app-token
        if: vars.USE_GITHUB_APP == 'true'
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.KDF_APP_ID }}
          private-key: ${{ secrets.KDF_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            kriegerdataforge
            kriegerdataforge-auth-ui
            fitness-app-backend
            fitness-app-frontend
            tiffanys-space
            tiffanys-space-backend
            kriegerdataforge-sdk
          permission-contents: read

      - name: Checkout cicd (this repo)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: kriegerdataforge-cicd

      - name: Checkout hub (kriegerdataforge)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Needless2Say/kriegerdataforge
          path: kriegerdataforge
          token: ${{ steps.app-token.outputs.token || secrets.CICD_PAT }}

      - name: Checkout auth-UI (kriegerdataforge-auth-ui)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Needless2Say/kriegerdataforge-auth-ui
          path: kriegerdataforge-auth-ui
          token: ${{ steps.app-token.outputs.token || secrets.CICD_PAT }}

      - name: Checkout fitness backend
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Needless2Say/fitness-app-backend
          path: fitness-app-backend
          token: ${{ steps.app-token.outputs.token || secrets.CICD_PAT }}

      - name: Checkout fitness frontend
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Needless2Say/fitness-app-frontend
          path: fitness-app-frontend
          token: ${{ steps.app-token.outputs.token || secrets.CICD_PAT }}

      # tiffanys repos are checked out unconditionally (cheap); the `journey`
      # profile decides whether their images actually build.
      - name: Checkout tiffanys frontend (tiffanys-space)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Needless2Say/tiffanys-space
          path: tiffanys-space
          token: ${{ steps.app-token.outputs.token || secrets.CICD_PAT }}

      - name: Checkout tiffanys backend (tiffanys-space-backend)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Needless2Say/tiffanys-space-backend
          path: tiffanys-space-backend
          token: ${{ steps.app-token.outputs.token || secrets.CICD_PAT }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      # Use the proven keygen path (the driver falls back to openssl, but this
      # matches what was validated locally).
      - name: Install driver keygen dep
        run: pip install cryptography

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Install Playwright (chromium)
        working-directory: kriegerdataforge-cicd/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Build + up + migrate + seed the stack
        working-directory: kriegerdataforge-cicd
        env:
          # The image build clones the private SDK; the App token is the git
          # credential (its scope includes kriegerdataforge-sdk). Auto-masked.
          GH_PACKAGES_PAT: ${{ steps.app-token.outputs.token || secrets.CICD_PAT }}
          JOURNEY: ${{ inputs.journey || 'all' }}
        # The driver discovers each journey's manifest, brings up only what that
        # journey needs, and STAGES its spec(s) into e2e/staged-tests/.
        run: python e2e/ci_stack.py up --journey "$JOURNEY"

      - name: Run the OIDC login journey
        working-directory: kriegerdataforge-cicd/e2e
        # ci_stack.py staged exactly the active journey's specs into staged-tests/,
        # so `npm test` runs precisely those — no --grep filter needed.
        run: npm test

      - name: Dump compose logs on failure
        if: failure()
        working-directory: kriegerdataforge-cicd
        run: python e2e/ci_stack.py logs

      - name: Upload Playwright report + traces
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: |
            kriegerdataforge-cicd/e2e/playwright-report/
            kriegerdataforge-cicd/e2e/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Tear down the stack
        if: always()
        working-directory: kriegerdataforge-cicd
        run: python e2e/ci_stack.py down
