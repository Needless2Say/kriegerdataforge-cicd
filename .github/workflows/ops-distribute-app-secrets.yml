name: Ops · Distribute App secrets (issue-triggered)

# Issue-form front-end for scripts/distribute_app_secrets.py (reports-ecosystem epic W2.5,
# ADR D-010). Copies THIS repo's KDF GitHub App credentials (KDF_APP_ID / KDF_APP_PRIVATE_KEY)
# to every consumer repo listed in scripts/secret_registry.json (entries carrying
# `distribute_source_env`) — generalizing ops-setup-e2e.yml's fixed-allow-list copy step so
# onboarding a consumer is a registry edit, not a workflow edit (AGENTS.md rule 12).
# ops-setup-e2e.yml still owns the E2E-specific variables (RUN_E2E_GATE / USE_GITHUB_APP).
#
# Triggered ONLY when the `ops:distribute-app-secrets` label is added — a deliberate,
# owner-applied "go". Owner-gated via the reusable fail-closed gate; this repo is public, so
# authorization — not obscurity — is the control (ADR D-002 pattern).
#
# PRE-ORG-MOVE STOPGAP: after an org move KDF_APP_* become ORG secrets (visible to every repo
# with no copy) — this flow and the per-repo copies are then obsolete; the registry's target
# list is the cleanup checklist.
#
# SECURITY:
#   * The write set is the REGISTRY's target list — the engine writes nowhere else, and the
#     App token minted here is scoped to exactly those repositories (secrets:write only).
#   * Secret VALUES never touch the issue or a comment: the engine prints only names, repos,
#     and timestamps (unit-tested invariant), so tee-ing its output into the comment is safe.
#     Values flow env -> libsodium sealed box; GitHub masks them in the (public) Actions log.
#   * The untrusted issue body is read as awk DATA via an env var, never inlined into a shell
#     string; mode/confirm are allow-listed.
#   * check mode is read-only (secret NAMES + timestamps — the API cannot return values).
#
# PREREQUISITE (one-time, already true for ops-setup-e2e): the KDF App holds repository
# **Secrets: write** and is installed on the target repos. Fallback: CICD_PAT.

on:
  issues:
    types:
      - labeled

permissions:
  contents: read

jobs:
  authorize:
    if: github.event.action == 'labeled' && github.event.label.name == 'ops:distribute-app-secrets'
    uses: ./.github/workflows/_authorize-owner.yml

  run:
    name: Distribute App secrets
    needs: authorize
    if: >-
      github.event.action == 'labeled' &&
      github.event.label.name == 'ops:distribute-app-secrets' &&
      needs.authorize.outputs.authorized == 'true'
    runs-on: ubuntu-slim
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Extract and validate fields
        id: fields
        env:
          # Untrusted issue-form body — read only as awk DATA, never inlined into a command.
          BODY: ${{ github.event.issue.body }}
        run: |
          field() {
            awk -v lbl="### $1" '
              { sub(/\r$/, "") }
              $0 == lbl { cap = 1; next }
              /^### / { cap = 0 }
              cap && NF { print }
            ' <<< "$BODY"
          }
          MODE="$(field "Mode" | head -1)"
          CONFIRM="$(field "Confirm" | head -1)"

          case "$MODE" in
            check|execute) ;;
            *) echo "::error::invalid or missing mode: '${MODE}'"; exit 1 ;;
          esac

          if [ "$MODE" = "execute" ]; then
            case "$CONFIRM" in
              "Yes"*) ;;
              *) echo "::error::mode=execute writes the App secrets to every registry target — set Confirm = 'Yes'."; exit 1 ;;
            esac
          fi

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"

      # The App token must be scoped to exactly the repos the engine may write. The list is
      # registry-driven (never hardcoded here): the engine's `targets` mode prints the short
      # names for create-github-app-token's `repositories:` input.
      - name: Compute target repositories (registry-driven)
        id: targets
        run: |
          repos="$(python scripts/distribute_app_secrets.py targets)"
          echo "repos=$repos" >> "$GITHUB_OUTPUT"

      # Short-lived App installation token (auto-revoked at job end), limited to the registry's
      # target repos with the single grant the engine needs (secrets: write covers check's read).
      # Gated on USE_GITHUB_APP with the CICD_PAT fallback, like the other ops workflows.
      - name: Mint GitHub App token (secrets write on the targets)
        id: app-token
        if: vars.USE_GITHUB_APP == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.KDF_APP_ID }}
          private-key: ${{ secrets.KDF_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ steps.targets.outputs.repos }}
          permission-secrets: write

      - name: Run distribution
        id: dist
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.CICD_PAT }}
          # Least privilege: the source values are exposed only to execute mode. The engine
          # never prints them; they flow straight into the per-target sealed box.
          KDF_APP_ID: ${{ steps.fields.outputs.mode == 'execute' && secrets.KDF_APP_ID || '' }}
          KDF_APP_PRIVATE_KEY: ${{ steps.fields.outputs.mode == 'execute' && secrets.KDF_APP_PRIVATE_KEY || '' }}
          MODE: ${{ steps.fields.outputs.mode }}
        run: |
          set +e
          python scripts/distribute_app_secrets.py "$MODE" | tee run.out
          rc=${PIPESTATUS[0]}
          set -e
          {
            echo "rc=$rc"
            echo "summary=mode=${MODE} (exit ${rc})"
          } >> "$GITHUB_OUTPUT"

      - name: Comment summary on the issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          SUMMARY: ${{ steps.dist.outputs.summary }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "### Ops — App-secret distribution result"
            echo
            echo "${SUMMARY:-Distribution did not run (denied, or an earlier step failed).}"
            echo
            if [ -f run.out ]; then
              echo '```'
              # Full engine output: the audit matrix / per-target OK-FAILED lines — names,
              # repos, and timestamps only; the engine never prints a secret value.
              cat run.out
              echo '```'
            fi
            echo
            echo "_See the [Actions run](${RUN_URL}) for details. After an App private-key rotation, run mode=execute so the consumer copies match — see \`docs/guides/SECRET_ROTATION.md\` §8.3a._"
          } > comment.md
          gh issue comment "$ISSUE" --repo "$REPO" --body-file comment.md

      # A non-zero exit is a real failure in EITHER mode: execute = a write failed; check = a
      # target could not be audited (missing copies are reported in-band with rc 0).
      - name: Fail the run if the engine errored
        if: steps.dist.outputs.rc != '0'
        env:
          RC: ${{ steps.dist.outputs.rc }}
        run: |
          echo "::error::distribution exited ${RC} — see the issue comment / Actions log."
          exit 1
