name: Python · Format check (ruff)

on:
  workflow_call:
    inputs:
      python_version:
        description: Python version to use
        type: string
        default: "3.13"
      install_command:
        description: Command to install dependencies before format-checking
        type: string
        default: "pip install -e \".[dev]\""
      format_command:
        description: Full ruff format check command to run
        type: string
        default: "python -m ruff format --check src/ tests/"

jobs:
  format:
    name: Format (ruff)
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ inputs.python_version }}

      # The slim runner lacks libpq, so psycopg2 (built from source — it ships
      # no manylinux wheels) fails with "pg_config executable not found".
      # Provide the build dependency so the install command works.
      - name: Install libpq (psycopg2 build dependency)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libpq-dev

      - name: Install dependencies
        run: ${{ inputs.install_command }}

      - name: Run ruff format check
        run: ${{ inputs.format_command }}
