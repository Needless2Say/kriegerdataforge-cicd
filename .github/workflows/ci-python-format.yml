name: Python · Format check (ruff)

on:
  workflow_call:
    inputs:
      python_version:
        description: Python version to use
        type: string
        default: "3.13"
      install_command:
        description: Command to install dependencies before format-checking
        type: string
        default: "pip install -e \".[dev]\""
      format_command:
        description: Full ruff format check command to run
        type: string
        default: "python -m ruff format --check src/ tests/"

jobs:
  format:
    name: Format (ruff)
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies
        run: ${{ inputs.install_command }}

      - name: Run ruff format check
        run: ${{ inputs.format_command }}
