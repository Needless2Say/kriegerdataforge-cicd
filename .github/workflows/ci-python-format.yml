name: Python · Format check (ruff)

on:
  workflow_call:
    inputs:
      python_version:
        description: Python version to use
        type: string
        default: "3.13"
      install_command:
        description: Command to install dependencies before format-checking
        type: string
        default: "pip install -e \".[dev]\""
      format_command:
        description: Full ruff format check command to run
        type: string
        default: "python -m ruff format --check src/ tests/"

jobs:
  format:
    name: Format (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies
        run: ${{ inputs.install_command }}

      - name: Run ruff format check
        run: ${{ inputs.format_command }}
