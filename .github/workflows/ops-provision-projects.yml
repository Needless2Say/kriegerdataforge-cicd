name: Ops · Provision Projects boards (issue-triggered)

# Issue-form front-end for scripts/provision_projects.py (reports-ecosystem epic, ADR D-010).
# Triggered ONLY when the `ops:provision-projects` label is added (a deliberate, owner-applied
# "go"). Authorization is enforced by the reusable owner-only gate; this repo is public, so the
# gate — not obscurity — is the control (ADR D-002 pattern).
#
# SECURITY:
#   * Issue content is untrusted: parsed values flow through env vars into argv arrays, never
#     inlined into a shell string; mode/confirm are allow-listed and the engine validates every
#     board key against the registry (unknown -> exit).
#   * Auth (resolved W1 finding): App installation tokens can READ user-owned ProjectsV2 but can't
#     create/modify them, so provisioning runs on CICD_PAT — the cicd control-plane PAT (classic,
#     project+repo). Never GH_PACKAGES_PAT (that is for package downloads only). SECRET_VALUE_NEW is
#     an optional staged override to run a one-off as a different PAT; revoke/clear it if used.
#   * Board node ids are METADATA, not secrets — safe in the issue summary; no token value is
#     ever echoed.

on:
  issues:
    types:
      - labeled

permissions:
  contents: read

jobs:
  authorize:
    if: github.event.action == 'labeled' && github.event.label.name == 'ops:provision-projects'
    uses: ./.github/workflows/_authorize-owner.yml

  run:
    name: Provision boards
    needs: authorize
    if: >-
      github.event.action == 'labeled' &&
      github.event.label.name == 'ops:provision-projects' &&
      needs.authorize.outputs.authorized == 'true'
    runs-on: ubuntu-slim
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Extract and validate fields
        id: fields
        env:
          # Untrusted issue-form body — read only as awk DATA, never inlined into a command.
          BODY: ${{ github.event.issue.body }}
        run: |
          field() {
            awk -v lbl="### $1" '
              { sub(/\r$/, "") }
              $0 == lbl { cap = 1; next }
              /^### / { cap = 0 }
              cap && NF { print }
            ' <<< "$BODY"
          }
          # multi-selects render one option per line -> join with commas; single-selects take line 1.
          BOARDS="$(field "Board(s)" | tr '\n' ',')"
          MODE="$(field "Mode" | head -1)"
          CONFIRM="$(field "Confirm" | head -1)"

          case "$MODE" in
            check|execute) ;;
            *) echo "::error::invalid or missing mode: '${MODE}'"; exit 1 ;;
          esac

          # normalize: strip CR + trailing comma; ALL / _No response_ -> empty -> 'all'
          norm() { local v; v="$(printf '%s' "$1" | tr -d '\r')"; v="${v%,}"; \
                   if [ -z "$v" ] || [ "$v" = "_No response_" ] || printf '%s' "$v" | tr ',' '\n' | grep -qix "ALL"; then echo "all"; else echo "$v"; fi; }
          BOARDS="$(norm "$BOARDS")"

          if [ "$MODE" = "execute" ]; then
            case "$CONFIRM" in
              "Yes"*) ;;
              *) echo "::error::mode=execute creates boards/fields/links — set Confirm = 'Yes'."; exit 1 ;;
            esac
          fi

          {
            echo "boards=$BOARDS"
            echo "mode=$MODE"
          } >> "$GITHUB_OUTPUT"

      - name: Run provisioner
        id: prov
        env:
          # Board provisioning needs a classic PAT with the `project` scope acting as the owner —
          # App installation tokens can't create user-owned ProjectsV2 (see _resolve_token). Per the
          # owner standard, cicd control-plane ops use CICD_PAT (classic; project+repo), never
          # GH_PACKAGES_PAT. SECRET_VALUE_NEW is an optional one-off override (takes precedence).
          GH_TOKEN: ${{ secrets.CICD_PAT }}
          GH_TOKEN_FALLBACK: ${{ secrets.SECRET_VALUE_NEW }}
          PROJECTS_OWNER: ${{ github.repository_owner }}
          MODE: ${{ steps.fields.outputs.mode }}
          BOARDS: ${{ steps.fields.outputs.boards }}
        run: |
          set +e
          if [ "$BOARDS" = "all" ]; then
            python scripts/provision_projects.py "$MODE" | tee run.out
          else
            python scripts/provision_projects.py "$MODE" --boards "$BOARDS" | tee run.out
          fi
          rc=${PIPESTATUS[0]}
          set -e
          {
            echo "rc=$rc"
            echo "summary=mode=${MODE} boards='${BOARDS}' (exit ${rc})"
          } >> "$GITHUB_OUTPUT"

      - name: Comment summary on the issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          SUMMARY: ${{ steps.prov.outputs.summary }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "### Ops — Projects boards provisioning result"
            echo
            echo "${SUMMARY:-Provisioning did not run (denied, or an earlier step failed).}"
            echo
            if [ -f run.out ]; then
              echo '```'
              # Full engine output: drift report / node-id map / manual steps — metadata only,
              # no token ever appears in engine output.
              cat run.out
              echo '```'
            fi
            echo
            echo "_See the [Actions run](${RUN_URL}) for details. Wire the printed node ids into each app's \`GH_REPORTS_*PROJECT_ID\` env (Wave 2 of the reports-ecosystem epic)._"
          } > comment.md
          gh issue comment "$ISSUE" --repo "$REPO" --body-file comment.md

      - name: Fail the run if provisioning errored
        if: steps.prov.outputs.rc != '0' && steps.fields.outputs.mode == 'execute'
        env:
          RC: ${{ steps.prov.outputs.rc }}
        run: |
          echo "::error::provision exited ${RC} — see the issue comment / Actions log."
          exit 1
