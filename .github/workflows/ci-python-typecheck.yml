name: Python · Type-check (mypy)

on:
  workflow_call:
    inputs:
      python_version:
        description: Python version to use
        type: string
        default: "3.13"
      install_command:
        description: Command to install dependencies before type-checking
        type: string
        default: "pip install -r requirements.txt"
      typecheck_command:
        description: Full mypy command to run
        type: string
        default: "python -m mypy api/"
      needs_sdk_auth:
        description: Configure git credentials for the private SDK (requires GH_PACKAGES_PAT secret)
        type: boolean
        default: false

jobs:
  type-check:
    name: Type-check (mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Configure private SDK access
        if: ${{ inputs.needs_sdk_auth }}
        env:
          GH_PACKAGES_PAT: ${{ secrets.GH_PACKAGES_PAT }}
        run: git config --global url."https://__token__:${GH_PACKAGES_PAT}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: ${{ inputs.install_command }}

      - name: Run mypy
        run: ${{ inputs.typecheck_command }}
