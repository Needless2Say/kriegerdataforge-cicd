name: Node.js · Lint & type-check

on:
  workflow_call:
    inputs:
      node_version:
        description: Node.js version to use
        type: string
        default: "22"

jobs:
  lint-and-typecheck:
    name: Lint · Type-check
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Install dependencies
        env:
          # Private GH-Packages npm auth (reports-ecosystem epic W3.5): consumers that
          # depend on @needless2say/* commit an .npmrc interpolating ${GH_NPM_TOKEN} — a
          # CLASSIC read:packages PAT (GH Packages rejects fine-grained PATs and App
          # installation tokens). Always exported; empty for token-less consumers.
          GH_NPM_TOKEN: ${{ secrets.GH_NPM_TOKEN }}
        run: npm ci

      - name: Lint
        run: make ci-lint

      - name: Type-check
        run: make ci-typecheck
