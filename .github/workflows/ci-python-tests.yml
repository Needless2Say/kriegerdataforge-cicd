name: Python · Unit tests (pytest)

on:
  workflow_call:
    inputs:
      python_version:
        description: Python version to use
        type: string
        default: "3.13"
      install_command:
        description: Command to install dependencies before running tests
        type: string
        default: "pip install -r requirements.txt"
      test_command:
        description: Full pytest command to run
        type: string
        default: "python -m pytest unit_tests/ -q --tb=short"
      needs_sdk_auth:
        description: Configure git credentials for the private SDK (requires GH_PACKAGES_PAT secret)
        type: boolean
        default: false

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Configure private SDK access
        if: ${{ inputs.needs_sdk_auth }}
        env:
          GH_PACKAGES_PAT: ${{ secrets.GH_PACKAGES_PAT }}
        run: git config --global url."https://__token__:${GH_PACKAGES_PAT}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: ${{ inputs.install_command }}

      - name: Run pytest
        run: ${{ inputs.test_command }}
