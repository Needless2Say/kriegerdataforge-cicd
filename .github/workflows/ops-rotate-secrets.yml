name: Ops · Rotate secret (issue-triggered)

# Issue-form front-end for the rotate_*.py scripts. Triggered ONLY when the `ops:rotate-secrets`
# label is added (a deliberate, owner-applied "go"). Authorization is enforced by the reusable
# owner-only gate; this repo is public, so the gate — not obscurity — is the control.
#
# SECURITY:
#   * Issue content is untrusted: parsed values flow through env vars into argv arrays, never
#     inlined into a shell string; target/mode/confirm are allow-listed before use.
#   * Secret VALUES never appear in the issue. GitHub masks registered secrets in the (also
#     public) Actions log; `gh issue comment` bodies are NOT masked, so this workflow posts only
#     a hand-built, metadata-only summary — never the scripts' raw stdout.
#   * `rotate` requires the Confirm field set to "Yes" and (for GH_PACKAGES_PAT) the owner to have
#     pre-set the GH_PACKAGES_PAT_NEW secret — GitHub cannot generate PATs.

on:
  issues:
    types:
      - labeled

permissions:
  contents: read

jobs:
  authorize:
    if: github.event.action == 'labeled' && github.event.label.name == 'ops:rotate-secrets'
    uses: ./.github/workflows/_authorize-owner.yml

  run:
    name: Rotate secret
    needs: authorize
    # Belt-and-suspenders: needs-success (the gate exit 1s on a non-owner) AND the gate's explicit
    # authorized output AND the label/action pins. No status function here, so the implicit
    # needs:authorize success requirement is preserved (a denied gate skips this job).
    if: >-
      github.event.action == 'labeled' &&
      github.event.label.name == 'ops:rotate-secrets' &&
      needs.authorize.outputs.authorized == 'true'
    runs-on: ubuntu-slim
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Extract and validate fields
        id: fields
        env:
          # Untrusted issue-form body — only ever read as awk DATA (here-string), never inlined into
          # a command, and every extracted value is allow-listed/normalized below.
          BODY: ${{ github.event.issue.body }}
        run: |
          # Self-parse the issue-form body ("### <Label>\n\n<value>...") — no third-party action.
          field() {
            awk -v lbl="### $1" '
              { sub(/\r$/, "") }
              $0 == lbl { cap = 1; next }
              /^### / { cap = 0 }
              cap && NF { print }
            ' <<< "$BODY"
          }
          TARGET="$(field "Target" | head -1)"
          MODE="$(field "Mode" | head -1)"
          APPS="$(field "Vercel apps" | tr '\n' ',')"
          ENVS="$(field "Vercel envs" | tr '\n' ',')"
          CONFIRM="$(field "Confirm" | head -1)"

          # Allow-list everything — never trust parsed values.
          case "$TARGET" in
            "GH_PACKAGES_PAT"|"Vercel tokens") ;;
            *) echo "::error::invalid or missing target: '${TARGET}'"; exit 1 ;;
          esac
          case "$MODE" in
            check|rotate) ;;
            *) echo "::error::invalid or missing mode: '${MODE}'"; exit 1 ;;
          esac

          # rotate is destructive — require explicit confirmation.
          if [ "$MODE" = "rotate" ]; then
            case "$CONFIRM" in
              "Yes"*) ;;
              *) echo "::error::mode=rotate requires Confirm = 'Yes — rotate live credentials'."; exit 1 ;;
            esac
          fi

          # apps/envs arrive comma-joined from field(); strip CR and trim the trailing comma.
          # _No response_ (blank optional field) or ALL (an exact comma-token) -> empty = all.
          APPS="$(printf '%s' "$APPS" | tr -d '\r')"; APPS="${APPS%,}"
          ENVS="$(printf '%s' "$ENVS" | tr -d '\r')"; ENVS="${ENVS%,}"
          if [ "$APPS" = "_No response_" ] || printf '%s' "$APPS" | tr ',' '\n' | grep -qix "ALL"; then APPS=""; fi
          if [ "$ENVS" = "_No response_" ] || printf '%s' "$ENVS" | tr ',' '\n' | grep -qix "ALL"; then ENVS=""; fi

          {
            echo "target=$TARGET"
            echo "mode=$MODE"
            echo "apps=$APPS"
            echo "envs=$ENVS"
          } >> "$GITHUB_OUTPUT"

      - name: Run rotation
        id: rot
        env:
          GH_TOKEN: ${{ secrets.CICD_PAT }}
          # Scope the target-specific secrets to the selected flow (least privilege): a Vercel
          # rotation never sees GH_PACKAGES_PAT_NEW, and a PAT rotation never sees VERCEL_MASTER_TOKEN.
          GH_PACKAGES_PAT_NEW: ${{ steps.fields.outputs.target == 'GH_PACKAGES_PAT' && secrets.GH_PACKAGES_PAT_NEW || '' }}
          VERCEL_MASTER_TOKEN: ${{ steps.fields.outputs.target == 'Vercel tokens' && secrets.VERCEL_MASTER_TOKEN || '' }}
          TARGET: ${{ steps.fields.outputs.target }}
          MODE: ${{ steps.fields.outputs.mode }}
          APPS: ${{ steps.fields.outputs.apps }}
          ENVS: ${{ steps.fields.outputs.envs }}
        run: |
          set +e
          rc=0
          summary=""
          if [ "$TARGET" = "GH_PACKAGES_PAT" ]; then
            if [ "$MODE" = "check" ]; then
              python scripts/rotate_gh_pat.py check; rc=$?
              summary="GH_PACKAGES_PAT expiry check (exit ${rc})"
            elif [ -z "$GH_PACKAGES_PAT_NEW" ]; then
              echo "::error::GH_PACKAGES_PAT_NEW repo secret is not set — create the new PAT and store it first."
              summary="ABORTED — GH_PACKAGES_PAT_NEW secret is not set; nothing rotated"
              rc=1
            else
              python scripts/rotate_gh_pat.py distribute; rc=$?
              summary="GH_PACKAGES_PAT distributed to all registry targets (exit ${rc})"
            fi
          else
            # Vercel tokens
            if [ "$MODE" = "check" ]; then
              echo "Vercel rotation has no check mode — choose rotate."
              summary="No-op — Vercel has no check mode; choose 'rotate'"
              rc=0
            elif [ -z "$VERCEL_MASTER_TOKEN" ]; then
              echo "::error::VERCEL_MASTER_TOKEN repo secret is not set."
              summary="ABORTED — VERCEL_MASTER_TOKEN secret is not set; nothing rotated"
              rc=1
            else
              ARGS=()
              if [ -n "$APPS" ]; then ARGS+=(--apps "$APPS"); fi
              if [ -n "$ENVS" ]; then ARGS+=(--envs "$ENVS"); fi
              python scripts/rotate_vercel_tokens.py "${ARGS[@]}"; rc=$?
              summary="Vercel tokens rotated (apps='${APPS:-all}', envs='${ENVS:-all}', exit ${rc})"
            fi
          fi
          set -e
          {
            echo "rc=$rc"
            echo "summary=$summary"
          } >> "$GITHUB_OUTPUT"

      - name: Comment summary on the issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          SUMMARY: ${{ steps.rot.outputs.summary }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "### Ops — secret rotation result"
            echo
            echo "${SUMMARY:-Rotation did not run (denied, or an earlier step failed).}"
            echo
            echo "_Full secret-masked output is in the [Actions run](${RUN_URL}). No secret value is echoed here._"
          } > comment.md
          gh issue comment "$ISSUE" --repo "$REPO" --body-file comment.md

      - name: Fail the run if a rotation errored
        if: steps.fields.outputs.mode == 'rotate' && steps.rot.outputs.rc != '0'
        env:
          RC: ${{ steps.rot.outputs.rc }}
        run: |
          echo "::error::rotation exited ${RC} — see the issue comment / Actions log."
          exit 1
