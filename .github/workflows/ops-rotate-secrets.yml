name: Ops · Rotate secret (issue-triggered)

# Issue-form front-end for scripts/rotate_secret.py. Triggered ONLY when the `ops:rotate-secrets`
# label is added (a deliberate, owner-applied "go"). Authorization is enforced by the reusable
# owner-only gate; this repo is public, so the gate — not obscurity — is the control.
#
# SECURITY:
#   * Issue content is untrusted: parsed values flow through env vars into argv arrays, never
#     inlined into a shell string; mode/confirm are allow-listed and the engine validates every
#     secret/env/app name against the registry (unknown -> exit).
#   * Secret VALUES never appear in the issue. For `paste`, the owner stages the value in the
#     SECRET_VALUE_NEW repo secret first — the issue only names the secret. GitHub masks
#     registered secrets in the (also public) Actions log; `gh issue comment` bodies are NOT
#     masked, so this workflow posts only a hand-built, metadata-only summary.
#   * App-plane (Terraform-managed) secrets are refused by the engine (terraform_managed guard).

on:
  issues:
    types:
      - labeled

permissions:
  contents: read

jobs:
  authorize:
    if: github.event.action == 'labeled' && github.event.label.name == 'ops:rotate-secrets'
    uses: ./.github/workflows/_authorize-owner.yml

  run:
    name: Rotate secret
    needs: authorize
    if: >-
      github.event.action == 'labeled' &&
      github.event.label.name == 'ops:rotate-secrets' &&
      needs.authorize.outputs.authorized == 'true'
    runs-on: ubuntu-slim
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Extract and validate fields
        id: fields
        env:
          # Untrusted issue-form body — read only as awk DATA, never inlined into a command.
          BODY: ${{ github.event.issue.body }}
        run: |
          field() {
            awk -v lbl="### $1" '
              { sub(/\r$/, "") }
              $0 == lbl { cap = 1; next }
              /^### / { cap = 0 }
              cap && NF { print }
            ' <<< "$BODY"
          }
          # multi-selects render one option per line -> join with commas; single-selects take line 1.
          SECRETS="$(field "Secret(s)" | tr '\n' ',')"
          MODE="$(field "Mode" | head -1)"
          ENVS="$(field "Environment(s)" | tr '\n' ',')"
          APPS="$(field "Vercel apps (generate only)" | tr '\n' ',')"
          CONFIRM="$(field "Confirm" | head -1)"

          case "$MODE" in
            check|generate|paste) ;;
            *) echo "::error::invalid or missing mode: '${MODE}'"; exit 1 ;;
          esac

          # normalize: strip CR + trailing comma; ALL / _No response_ -> empty -> 'all'
          norm() { local v; v="$(printf '%s' "$1" | tr -d '\r')"; v="${v%,}"; \
                   if [ -z "$v" ] || [ "$v" = "_No response_" ] || printf '%s' "$v" | tr ',' '\n' | grep -qix "ALL"; then echo "all"; else echo "$v"; fi; }
          SECRETS="$(norm "$SECRETS")"
          ENVS="$(norm "$ENVS")"
          APPS="$(norm "$APPS")"

          if [ "$MODE" = "paste" ] || [ "$MODE" = "generate" ]; then
            case "$CONFIRM" in
              "Yes"*) ;;
              *) echo "::error::mode=${MODE} writes live credentials — set Confirm = 'Yes'."; exit 1 ;;
            esac
          fi
          # paste distributes a single staged value -> exactly one secret, never 'all'.
          if [ "$MODE" = "paste" ]; then
            if [ "$SECRETS" = "all" ] || printf '%s' "$SECRETS" | grep -q ','; then
              echo "::error::paste mode needs exactly one secret selected."; exit 1
            fi
          fi

          {
            echo "secrets=$SECRETS"
            echo "mode=$MODE"
            echo "envs=$ENVS"
            echo "apps=$APPS"
          } >> "$GITHUB_OUTPUT"

      - name: Run rotation
        id: rot
        env:
          GH_TOKEN: ${{ secrets.CICD_PAT }}
          # Least privilege: the Vercel master + the staged paste value are exposed only to the
          # flows that need them.
          VERCEL_MASTER_TOKEN: ${{ steps.fields.outputs.mode != 'check' && secrets.VERCEL_MASTER_TOKEN || '' }}
          STAGED_SECRET_VALUE: ${{ steps.fields.outputs.mode == 'paste' && secrets.SECRET_VALUE_NEW || '' }}
          MODE: ${{ steps.fields.outputs.mode }}
          SECRETS: ${{ steps.fields.outputs.secrets }}
          ENVS: ${{ steps.fields.outputs.envs }}
          APPS: ${{ steps.fields.outputs.apps }}
        run: |
          set +e
          if [ "$MODE" = "paste" ] && [ -z "$STAGED_SECRET_VALUE" ]; then
            echo "::error::paste needs the value staged in the SECRET_VALUE_NEW repo secret first."
            echo "summary=ABORTED — SECRET_VALUE_NEW is not set; nothing written" >> "$GITHUB_OUTPUT"
            echo "rc=1" >> "$GITHUB_OUTPUT"; exit 0
          fi
          python scripts/rotate_secret.py --mode "$MODE" --secrets "$SECRETS" --envs "$ENVS" --apps "$APPS"
          rc=$?
          set -e
          {
            echo "rc=$rc"
            echo "summary=mode=${MODE} secrets='${SECRETS}' envs='${ENVS}' apps='${APPS}' (exit ${rc})"
          } >> "$GITHUB_OUTPUT"

      - name: Comment summary on the issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          SUMMARY: ${{ steps.rot.outputs.summary }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "### Ops — secret rotation result"
            echo
            echo "${SUMMARY:-Rotation did not run (denied, or an earlier step failed).}"
            echo
            echo "_Full secret-masked output is in the [Actions run](${RUN_URL}). No secret value is echoed here._"
          } > comment.md
          gh issue comment "$ISSUE" --repo "$REPO" --body-file comment.md

      - name: Fail the run if a rotation errored
        if: steps.fields.outputs.mode != 'check' && steps.rot.outputs.rc != '0'
        env:
          RC: ${{ steps.rot.outputs.rc }}
        run: |
          echo "::error::rotation exited ${RC} — see the issue comment / Actions log."
          exit 1
