# Reusable CD workflow — Terraform Apply
#
# Called by kriegerdataforge-terraform to run `terraform apply` against the
# Vercel infrastructure. The `environment` input activates the GitHub
# Environment gate (infrastructure environment, owner-only approval).
#
# All sensitive Terraform variables are supplied via TF_VAR_* environment
# variables sourced from the GitHub Environment secrets. Non-sensitive
# variables with custom values live in terraform.tfvars (committed). Variables
# with acceptable defaults in variables.tf need no override.
#
# Required environment secrets in the "infrastructure" GitHub Environment:
#   VERCEL_API_TOKEN                    — maps to TF_VAR_vercel_api_token
#   BACKEND_AUTH_SECRET_KEY             — maps to TF_VAR_backend_auth_secret_key
#   BACKEND_AUTH_ADMIN_EMAIL            — maps to TF_VAR_backend_auth_admin_email
#   BACKEND_AUTH_ADMIN_EMAIL_PASSWORD   — maps to TF_VAR_backend_auth_admin_email_password
#   BACKEND_DB_DATABASE_URL             — maps to TF_VAR_backend_db_database_url
#   DEV_BACKEND_DB_DATABASE_URL         — maps to TF_VAR_dev_backend_db_database_url
#   FRONTEND_AUTH_SECRET_KEY            — maps to TF_VAR_frontend_auth_secret_key
#   TIFFANYS_SPACE_CRON_SECRET          — maps to TF_VAR_tiffanys_space_cron_secret
# Optional environment secrets (leave empty to skip):
#   BACKEND_STRIPE_SECRET_KEY           — maps to TF_VAR_backend_stripe_secret_key
#   BACKEND_STRIPE_WEBHOOK_SECRET       — maps to TF_VAR_backend_stripe_webhook_secret
#   FITNESS_APP_SENTRY_AUTH_TOKEN       — maps to TF_VAR_fitness_app_sentry_auth_token
#   TIFFANYS_SPACE_SENTRY_AUTH_TOKEN    — maps to TF_VAR_tiffanys_space_sentry_auth_token
#
# Required environment variables (non-secret) in the "infrastructure" environment:
#   VERCEL_TEAM_ID          — maps to TF_VAR_vercel_team_id
#   BACKEND_URL_PRODUCTION  — maps to TF_VAR_backend_url_production
#   BACKEND_URL_PREVIEW     — maps to TF_VAR_backend_url_preview
#   DEV_BACKEND_URL         — maps to TF_VAR_dev_backend_url
#
# After setting up Terraform Cloud (see docs/MANUAL_SETUP.md):
#   TF_TOKEN_app_terraform_io — Terraform Cloud API token (for remote state auth)
#
# Usage (kriegerdataforge-terraform .github/workflows/cd.yml):
#   jobs:
#     apply:
#       uses: Needless2Say/kriegerdataforge-cicd/.github/workflows/cd-terraform.yml@main
#       with:
#         environment: infrastructure
#       secrets: inherit

name: CD — Terraform Apply (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target GitHub Environment (should always be "infrastructure")'
        required: true
        type: string

jobs:
  apply:
    name: Terraform Apply (${{ inputs.environment }})
    runs-on: ubuntu-latest

    # Activates the "infrastructure" GitHub Environment gate:
    # - Pauses for owner approval before any apply
    # - Loads environment-scoped secrets and variables
    environment: ${{ inputs.environment }}

    permissions:
      contents: read

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          # TF_TOKEN_app_terraform_io is picked up automatically by the
          # Terraform CLI for Terraform Cloud authentication once the cloud
          # backend block is uncommented in providers.tf.

      - name: Terraform Init
        run: terraform init
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -detailed-exitcode
        env:
          # ── Sensitive Terraform variables ──────────────────────────────────
          TF_VAR_vercel_api_token: ${{ secrets.VERCEL_API_TOKEN }}
          TF_VAR_backend_auth_secret_key: ${{ secrets.BACKEND_AUTH_SECRET_KEY }}
          TF_VAR_backend_auth_admin_email: ${{ secrets.BACKEND_AUTH_ADMIN_EMAIL }}
          TF_VAR_backend_auth_admin_email_password: ${{ secrets.BACKEND_AUTH_ADMIN_EMAIL_PASSWORD }}
          TF_VAR_backend_db_database_url: ${{ secrets.BACKEND_DB_DATABASE_URL }}
          TF_VAR_dev_backend_db_database_url: ${{ secrets.DEV_BACKEND_DB_DATABASE_URL }}
          TF_VAR_frontend_auth_secret_key: ${{ secrets.FRONTEND_AUTH_SECRET_KEY }}
          TF_VAR_tiffanys_space_cron_secret: ${{ secrets.TIFFANYS_SPACE_CRON_SECRET }}
          TF_VAR_backend_stripe_secret_key: ${{ secrets.BACKEND_STRIPE_SECRET_KEY }}
          TF_VAR_backend_stripe_webhook_secret: ${{ secrets.BACKEND_STRIPE_WEBHOOK_SECRET }}
          TF_VAR_fitness_app_sentry_auth_token: ${{ secrets.FITNESS_APP_SENTRY_AUTH_TOKEN }}
          TF_VAR_tiffanys_space_sentry_auth_token: ${{ secrets.TIFFANYS_SPACE_SENTRY_AUTH_TOKEN }}
          # ── Non-sensitive Terraform variables (no defaults or custom values) ─
          TF_VAR_vercel_team_id: ${{ vars.VERCEL_TEAM_ID }}
          TF_VAR_backend_url_production: ${{ vars.BACKEND_URL_PRODUCTION }}
          TF_VAR_backend_url_preview: ${{ vars.BACKEND_URL_PREVIEW }}
          TF_VAR_dev_backend_url: ${{ vars.DEV_BACKEND_URL }}
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}

      # Only apply if plan detected changes (exit code 2 = changes present).
      # Exit code 0 = no changes, exit code 1 = error (already failed above).
      - name: Terraform Apply
        if: steps.plan.outputs.exitcode == 2
        run: terraform apply tfplan
        env:
          TF_VAR_vercel_api_token: ${{ secrets.VERCEL_API_TOKEN }}
          TF_VAR_backend_auth_secret_key: ${{ secrets.BACKEND_AUTH_SECRET_KEY }}
          TF_VAR_backend_auth_admin_email: ${{ secrets.BACKEND_AUTH_ADMIN_EMAIL }}
          TF_VAR_backend_auth_admin_email_password: ${{ secrets.BACKEND_AUTH_ADMIN_EMAIL_PASSWORD }}
          TF_VAR_backend_db_database_url: ${{ secrets.BACKEND_DB_DATABASE_URL }}
          TF_VAR_dev_backend_db_database_url: ${{ secrets.DEV_BACKEND_DB_DATABASE_URL }}
          TF_VAR_frontend_auth_secret_key: ${{ secrets.FRONTEND_AUTH_SECRET_KEY }}
          TF_VAR_tiffanys_space_cron_secret: ${{ secrets.TIFFANYS_SPACE_CRON_SECRET }}
          TF_VAR_backend_stripe_secret_key: ${{ secrets.BACKEND_STRIPE_SECRET_KEY }}
          TF_VAR_backend_stripe_webhook_secret: ${{ secrets.BACKEND_STRIPE_WEBHOOK_SECRET }}
          TF_VAR_fitness_app_sentry_auth_token: ${{ secrets.FITNESS_APP_SENTRY_AUTH_TOKEN }}
          TF_VAR_tiffanys_space_sentry_auth_token: ${{ secrets.TIFFANYS_SPACE_SENTRY_AUTH_TOKEN }}
          TF_VAR_vercel_team_id: ${{ vars.VERCEL_TEAM_ID }}
          TF_VAR_backend_url_production: ${{ vars.BACKEND_URL_PRODUCTION }}
          TF_VAR_backend_url_preview: ${{ vars.BACKEND_URL_PREVIEW }}
          TF_VAR_dev_backend_url: ${{ vars.DEV_BACKEND_URL }}
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}

      - name: No changes
        if: steps.plan.outputs.exitcode == 0
        run: echo "No infrastructure changes detected — nothing to apply."
