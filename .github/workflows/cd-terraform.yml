# Reusable CD workflow — Terraform Apply
#
# Called by kriegerdataforge-terraform to run `terraform apply` against the
# Vercel infrastructure. The `environment` input activates the GitHub
# Environment gate (owner-only approval). The `workspace` input selects the
# Terraform workspace (dev or prod) before plan/apply.
#
# Non-sensitive shared variables live in shared.tfvars (committed to git) and
# are loaded via -var-file=shared.tfvars. All other variables are injected as
# TF_VAR_* environment variables from the GitHub Environment secrets/variables.
#
# ── GitHub Environments ───────────────────────────────────────────────────────
# Create TWO environments in the kriegerdataforge-terraform repo:
#   dev  — dev workspace secrets/variables
#   prod — prod workspace secrets/variables
#
# ── Required secrets (per environment) ────────────────────────────────────────
#   VERCEL_API_TOKEN                      → TF_VAR_vercel_api_token
#   BACKEND_AUTH_PRIVATE_KEY              → TF_VAR_backend_auth_private_key  (RSA private key PEM, PKCS#8)
#   BACKEND_AUTH_PUBLIC_KEY               → TF_VAR_backend_auth_public_key
#   FRONTEND_AUTH_PUBLIC_KEY              → TF_VAR_frontend_auth_public_key  (same as BACKEND_AUTH_PUBLIC_KEY)
#   BACKEND_AUTH_ADMIN_EMAIL              → TF_VAR_backend_auth_admin_email
#   BACKEND_AUTH_ADMIN_EMAIL_PASSWORD     → TF_VAR_backend_auth_admin_email_password
#   KDF_AUTH_DB_DATABASE_URL              → TF_VAR_kdf_auth_db_database_url
#   FITNESS_APP_BACKEND_DB_DATABASE_URL   → TF_VAR_fitness_app_backend_db_database_url
#   TIFFANYS_SPACE_BACKEND_DB_DATABASE_URL → TF_VAR_tiffanys_space_backend_db_database_url
#   FITNESS_APP_SERVICE_KEY                → TF_VAR_fitness_app_service_key  (openssl rand -hex 32)
#   TIFFANYS_SPACE_SERVICE_KEY             → TF_VAR_tiffanys_space_service_key  (openssl rand -hex 32)
#
# ── Optional secrets (leave unset to use defaults / disable feature) ──────────
#   TIFFANYS_SPACE_CRON_SECRET            → TF_VAR_tiffanys_space_cron_secret
#   BACKEND_STRIPE_SECRET_KEY             → TF_VAR_backend_stripe_secret_key
#   BACKEND_STRIPE_WEBHOOK_SECRET         → TF_VAR_backend_stripe_webhook_secret
#   FITNESS_APP_SENTRY_AUTH_TOKEN         → TF_VAR_fitness_app_sentry_auth_token
#   TIFFANYS_SPACE_SENTRY_AUTH_TOKEN      → TF_VAR_tiffanys_space_sentry_auth_token
#
# ── Required environment variables (non-secret, per environment) ──────────────
#   BACKEND_URL                           → TF_VAR_backend_url
#   KDF_AUTH_SERVICE_PROJECT_NAME         → TF_VAR_kdf_auth_service_project_name
#   FITNESS_APP_PROJECT_NAME              → TF_VAR_fitness_app_project_name
#   FITNESS_APP_BACKEND_PROJECT_NAME      → TF_VAR_fitness_app_backend_project_name
#   TIFFANYS_SPACE_PROJECT_NAME           → TF_VAR_tiffanys_space_project_name
#   TIFFANYS_SPACE_BACKEND_PROJECT_NAME   → TF_VAR_tiffanys_space_backend_project_name
#
# ── Optional environment variables ────────────────────────────────────────────
#   KDF_AUTH_CORS_ORIGINS                 → TF_VAR_kdf_auth_cors_origins
#   FITNESS_APP_BACKEND_CORS_ORIGINS      → TF_VAR_fitness_app_backend_cors_origins
#   TIFFANYS_SPACE_BACKEND_CORS_ORIGINS   → TF_VAR_tiffanys_space_backend_cors_origins
#
# ── After setting up Terraform Cloud ─────────────────────────────────────────
#   TF_TOKEN_APP_TERRAFORM_IO  — Terraform Cloud API token (remote state auth)

name: CD — Terraform Apply (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target GitHub Environment (dev or prod)'
        required: true
        type: string
      workspace:
        description: 'Terraform workspace to select (dev or prod)'
        required: true
        type: string
      version:
        description: 'Version to deploy (e.g. 1.2.0). Specify an older version to roll back. NOTE: rolling back Terraform reverts config but not state — review plan carefully.'
        required: true
        type: string

jobs:
  apply:
    name: Terraform Apply (${{ inputs.workspace }})
    runs-on: ubuntu-latest

    # Activates the environment gate (owner approval) and loads its
    # scoped secrets and variables.
    environment: ${{ inputs.environment }}

    permissions:
      contents: read

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: v${{ inputs.version }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Init
        run: terraform init
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}

      - name: Select workspace
        run: terraform workspace select ${{ inputs.workspace }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file=shared.tfvars -out=tfplan -detailed-exitcode
        env:
          # ── Credentials (same value for both workspaces) ───────────────────
          TF_VAR_vercel_api_token:                      ${{ secrets.VERCEL_API_TOKEN }}
          TF_VAR_backend_auth_admin_email:              ${{ secrets.BACKEND_AUTH_ADMIN_EMAIL }}
          TF_VAR_backend_auth_admin_email_password:     ${{ secrets.BACKEND_AUTH_ADMIN_EMAIL_PASSWORD }}
          # ── Workspace-specific secrets ────────────────────────────────────
          TF_VAR_backend_auth_private_key:              ${{ secrets.BACKEND_AUTH_PRIVATE_KEY }}
          TF_VAR_backend_auth_public_key:               ${{ secrets.BACKEND_AUTH_PUBLIC_KEY }}
          TF_VAR_frontend_auth_public_key:              ${{ secrets.FRONTEND_AUTH_PUBLIC_KEY }}
          TF_VAR_kdf_auth_db_database_url:              ${{ secrets.KDF_AUTH_DB_DATABASE_URL }}
          TF_VAR_fitness_app_backend_db_database_url:   ${{ secrets.FITNESS_APP_BACKEND_DB_DATABASE_URL }}
          TF_VAR_tiffanys_space_backend_db_database_url: ${{ secrets.TIFFANYS_SPACE_BACKEND_DB_DATABASE_URL }}
          TF_VAR_fitness_app_service_key:                ${{ secrets.FITNESS_APP_SERVICE_KEY }}
          TF_VAR_tiffanys_space_service_key:              ${{ secrets.TIFFANYS_SPACE_SERVICE_KEY }}
          TF_VAR_tiffanys_space_cron_secret:            ${{ secrets.TIFFANYS_SPACE_CRON_SECRET }}
          # ── Optional secrets ──────────────────────────────────────────────
          TF_VAR_backend_stripe_secret_key:             ${{ secrets.BACKEND_STRIPE_SECRET_KEY }}
          TF_VAR_backend_stripe_webhook_secret:         ${{ secrets.BACKEND_STRIPE_WEBHOOK_SECRET }}
          TF_VAR_fitness_app_sentry_auth_token:         ${{ secrets.FITNESS_APP_SENTRY_AUTH_TOKEN }}
          TF_VAR_tiffanys_space_sentry_auth_token:      ${{ secrets.TIFFANYS_SPACE_SENTRY_AUTH_TOKEN }}
          # ── Workspace-specific variables (non-secret) ────────────────────
          TF_VAR_backend_url:                           ${{ vars.BACKEND_URL }}
          TF_VAR_kdf_auth_service_project_name:         ${{ vars.KDF_AUTH_SERVICE_PROJECT_NAME }}
          TF_VAR_fitness_app_project_name:              ${{ vars.FITNESS_APP_PROJECT_NAME }}
          TF_VAR_fitness_app_backend_project_name:      ${{ vars.FITNESS_APP_BACKEND_PROJECT_NAME }}
          TF_VAR_tiffanys_space_project_name:           ${{ vars.TIFFANYS_SPACE_PROJECT_NAME }}
          TF_VAR_tiffanys_space_backend_project_name:   ${{ vars.TIFFANYS_SPACE_BACKEND_PROJECT_NAME }}
          # ── Optional variables ────────────────────────────────────────────
          TF_VAR_kdf_auth_cors_origins:                 ${{ vars.KDF_AUTH_CORS_ORIGINS }}
          TF_VAR_fitness_app_backend_cors_origins:      ${{ vars.FITNESS_APP_BACKEND_CORS_ORIGINS }}
          TF_VAR_tiffanys_space_backend_cors_origins:   ${{ vars.TIFFANYS_SPACE_BACKEND_CORS_ORIGINS }}
          TF_TOKEN_app_terraform_io:                    ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}

      # Only apply if plan detected changes (exit code 2 = changes present).
      # Exit code 0 = no changes, exit code 1 = error (already failed above).
      - name: Terraform Apply
        if: steps.plan.outputs.exitcode == 2
        run: terraform apply tfplan
        env:
          # ── Credentials ───────────────────────────────────────────────────
          TF_VAR_vercel_api_token:                      ${{ secrets.VERCEL_API_TOKEN }}
          TF_VAR_backend_auth_admin_email:              ${{ secrets.BACKEND_AUTH_ADMIN_EMAIL }}
          TF_VAR_backend_auth_admin_email_password:     ${{ secrets.BACKEND_AUTH_ADMIN_EMAIL_PASSWORD }}
          # ── Workspace-specific secrets ────────────────────────────────────
          TF_VAR_backend_auth_private_key:              ${{ secrets.BACKEND_AUTH_PRIVATE_KEY }}
          TF_VAR_backend_auth_public_key:               ${{ secrets.BACKEND_AUTH_PUBLIC_KEY }}
          TF_VAR_frontend_auth_public_key:              ${{ secrets.FRONTEND_AUTH_PUBLIC_KEY }}
          TF_VAR_kdf_auth_db_database_url:              ${{ secrets.KDF_AUTH_DB_DATABASE_URL }}
          TF_VAR_fitness_app_backend_db_database_url:   ${{ secrets.FITNESS_APP_BACKEND_DB_DATABASE_URL }}
          TF_VAR_tiffanys_space_backend_db_database_url: ${{ secrets.TIFFANYS_SPACE_BACKEND_DB_DATABASE_URL }}
          TF_VAR_fitness_app_service_key:                ${{ secrets.FITNESS_APP_SERVICE_KEY }}
          TF_VAR_tiffanys_space_service_key:              ${{ secrets.TIFFANYS_SPACE_SERVICE_KEY }}
          TF_VAR_tiffanys_space_cron_secret:            ${{ secrets.TIFFANYS_SPACE_CRON_SECRET }}
          # ── Optional secrets ──────────────────────────────────────────────
          TF_VAR_backend_stripe_secret_key:             ${{ secrets.BACKEND_STRIPE_SECRET_KEY }}
          TF_VAR_backend_stripe_webhook_secret:         ${{ secrets.BACKEND_STRIPE_WEBHOOK_SECRET }}
          TF_VAR_fitness_app_sentry_auth_token:         ${{ secrets.FITNESS_APP_SENTRY_AUTH_TOKEN }}
          TF_VAR_tiffanys_space_sentry_auth_token:      ${{ secrets.TIFFANYS_SPACE_SENTRY_AUTH_TOKEN }}
          # ── Workspace-specific variables (non-secret) ────────────────────
          TF_VAR_backend_url:                           ${{ vars.BACKEND_URL }}
          TF_VAR_kdf_auth_service_project_name:         ${{ vars.KDF_AUTH_SERVICE_PROJECT_NAME }}
          TF_VAR_fitness_app_project_name:              ${{ vars.FITNESS_APP_PROJECT_NAME }}
          TF_VAR_fitness_app_backend_project_name:      ${{ vars.FITNESS_APP_BACKEND_PROJECT_NAME }}
          TF_VAR_tiffanys_space_project_name:           ${{ vars.TIFFANYS_SPACE_PROJECT_NAME }}
          TF_VAR_tiffanys_space_backend_project_name:   ${{ vars.TIFFANYS_SPACE_BACKEND_PROJECT_NAME }}
          # ── Optional variables ────────────────────────────────────────────
          TF_VAR_kdf_auth_cors_origins:                 ${{ vars.KDF_AUTH_CORS_ORIGINS }}
          TF_VAR_fitness_app_backend_cors_origins:      ${{ vars.FITNESS_APP_BACKEND_CORS_ORIGINS }}
          TF_VAR_tiffanys_space_backend_cors_origins:   ${{ vars.TIFFANYS_SPACE_BACKEND_CORS_ORIGINS }}
          TF_TOKEN_app_terraform_io:                    ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}

      - name: No changes
        if: steps.plan.outputs.exitcode == 0
        run: echo "No infrastructure changes detected — nothing to apply."
