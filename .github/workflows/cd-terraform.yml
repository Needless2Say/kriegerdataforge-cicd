# Reusable CD workflow — Terraform Apply
#
# Called by kriegerdataforge-terraform to run `terraform plan` + `terraform apply`
# against the Vercel infrastructure.
#
# ── Layout (directory-per-environment) ────────────────────────────────────────
# The consumer repo is laid out as reusable modules under modules/ and one
# deployable root per environment under environments/<env>/. There are NO
# Terraform workspaces. This workflow runs every terraform command with
# `-chdir=environments/${{ inputs.environment }}` (dev or prod). Each env root
# auto-loads its committed, NON-secret common.auto.tfvars; all per-environment
# secret + non-secret values are injected here as TF_VAR_* environment variables
# (the real *.auto.tfvars files are gitignored and absent in CI).
#
# The `environment` input both selects the env root directory AND activates the
# matching GitHub Environment gate (owner-only approval) whose scoped
# secrets/variables are loaded below.
#
# ── Required secrets (per GitHub Environment: dev, prod) ───────────────────────
#   VERCEL_API_TOKEN                       → TF_VAR_vercel_api_token
#   BACKEND_AUTH_ADMIN_EMAIL               → TF_VAR_backend_auth_admin_email
#   BACKEND_AUTH_ADMIN_EMAIL_PASSWORD      → TF_VAR_backend_auth_admin_email_password
#   BACKEND_AUTH_PRIVATE_KEY               → TF_VAR_backend_auth_private_key  (RSA PEM, PKCS#8)
#   BACKEND_AUTH_PUBLIC_KEY                → TF_VAR_backend_auth_public_key
#   FRONTEND_AUTH_PUBLIC_KEY               → TF_VAR_frontend_auth_public_key  (== BACKEND_AUTH_PUBLIC_KEY)
#   KDF_AUTH_DB_DATABASE_URL               → TF_VAR_kdf_auth_db_database_url
#   FITNESS_APP_BACKEND_DB_DATABASE_URL    → TF_VAR_fitness_app_backend_db_database_url
#   TIFFANYS_SPACE_BACKEND_DB_DATABASE_URL → TF_VAR_tiffanys_space_backend_db_database_url
#   FITNESS_APP_SERVICE_KEY                → TF_VAR_fitness_app_service_key   (openssl rand -hex 32)
#   TIFFANYS_SPACE_SERVICE_KEY             → TF_VAR_tiffanys_space_service_key (openssl rand -hex 32)
#
# ── Optional secrets (unset = use default / disable feature) ──────────────────
#   TIFFANYS_SPACE_CRON_SECRET             → TF_VAR_tiffanys_space_cron_secret
#   BACKEND_STRIPE_SECRET_KEY              → TF_VAR_backend_stripe_secret_key
#   BACKEND_STRIPE_WEBHOOK_SECRET          → TF_VAR_backend_stripe_webhook_secret
#   TF_TOKEN_APP_TERRAFORM_IO              → Terraform Cloud auth (until remote state is configured)
#
# ── Required environment variables (non-secret, per GitHub Environment) ───────
#   BACKEND_URL                            → TF_VAR_backend_url                  (KDF auth service URL)
#   FITNESS_APP_BACKEND_URL                → TF_VAR_fitness_app_backend_url      (fitness app's own backend)
#   TIFFANYS_SPACE_BACKEND_URL             → TF_VAR_tiffanys_space_backend_url   (tiffany's own backend)
#   KDF_AUTH_SERVICE_PROJECT_NAME          → TF_VAR_kdf_auth_service_project_name
#   FITNESS_APP_PROJECT_NAME               → TF_VAR_fitness_app_project_name
#   FITNESS_APP_BACKEND_PROJECT_NAME       → TF_VAR_fitness_app_backend_project_name
#   TIFFANYS_SPACE_PROJECT_NAME            → TF_VAR_tiffanys_space_project_name
#   TIFFANYS_SPACE_BACKEND_PROJECT_NAME    → TF_VAR_tiffanys_space_backend_project_name
#
# ── Optional environment variables ────────────────────────────────────────────
#   KDF_AUTH_CORS_ORIGINS                  → TF_VAR_kdf_auth_cors_origins
#   FITNESS_APP_BACKEND_CORS_ORIGINS       → TF_VAR_fitness_app_backend_cors_origins
#   TIFFANYS_SPACE_BACKEND_CORS_ORIGINS    → TF_VAR_tiffanys_space_backend_cors_origins
#
# NOTE: the non-secret shared values (vercel_team_id, github_org, JWT issuer/audience,
#   token TTLs, feature-flag defaults) come from the committed
#   environments/<env>/common.auto.tfvars and do NOT need to be injected here.
#
# ⚠ STATE: this workflow assumes a remote backend (Terraform Cloud / S3) is
#   configured per env root — `terraform init` in CI starts with EMPTY local state,
#   so without a remote backend a plan would propose creating everything. Configure
#   the backend block in environments/<env>/providers.tf before running CD live.

name: CD — Terraform Apply (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment (dev or prod) — selects environments/<env>/ AND the GitHub Environment gate'
        required: true
        type: string
      version:
        description: 'Version to deploy (e.g. 1.2.0). Specify an older version to roll back. NOTE: rolling back Terraform reverts config but not state — review the plan carefully.'
        required: true
        type: string

jobs:
  # ── Deployer authorization gate ───────────────────────────────────────────
  # Runs BEFORE the apply job, and BEFORE the GitHub Environment approval is
  # requested. Verifies the user who dispatched this run is an approved deployer
  # for this repo + environment, per the central allow-list in
  # kriegerdataforge-cicd (scripts/deployer_registry.json). Fails closed.
  authorize:
    name: Authorize deployer
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - name: Check out deployer registry (kriegerdataforge-cicd)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: Needless2Say/kriegerdataforge-cicd
          ref: main
          sparse-checkout: scripts
          path: _kdf_cicd
          # Default token works when this cicd repo is public. If it is private,
          # add a repo/org secret CICD_REGISTRY_PAT (read-only) — it is picked up
          # via the caller's `secrets: inherit`; otherwise we fall back to github.token.
          token: ${{ secrets.CICD_REGISTRY_PAT || github.token }}

      - name: Verify deployer is approved
        run: python3 _kdf_cicd/scripts/check_deployer.py
        env:
          DEPLOY_REPO: ${{ github.repository }}
          DEPLOY_ACTOR: ${{ github.triggering_actor }}
          DEPLOY_ENVIRONMENT: ${{ inputs.environment }}

  apply:
    name: Terraform Apply (${{ inputs.environment }})
    needs: authorize
    runs-on: ubuntu-slim

    # Activates the environment gate (owner approval) and loads its scoped
    # secrets and variables.
    environment: ${{ inputs.environment }}

    permissions:
      contents: read

    # Run every terraform command against the selected environment root.
    env:
      TF_DIR: environments/${{ inputs.environment }}
      # ── Credentials / secrets ─────────────────────────────────────────────
      TF_VAR_vercel_api_token: ${{ secrets.VERCEL_API_TOKEN }}
      TF_VAR_backend_auth_admin_email: ${{ secrets.BACKEND_AUTH_ADMIN_EMAIL }}
      TF_VAR_backend_auth_admin_email_password: ${{ secrets.BACKEND_AUTH_ADMIN_EMAIL_PASSWORD }}
      TF_VAR_backend_auth_private_key: ${{ secrets.BACKEND_AUTH_PRIVATE_KEY }}
      TF_VAR_backend_auth_public_key: ${{ secrets.BACKEND_AUTH_PUBLIC_KEY }}
      TF_VAR_frontend_auth_public_key: ${{ secrets.FRONTEND_AUTH_PUBLIC_KEY }}
      TF_VAR_kdf_auth_db_database_url: ${{ secrets.KDF_AUTH_DB_DATABASE_URL }}
      TF_VAR_fitness_app_backend_db_database_url: ${{ secrets.FITNESS_APP_BACKEND_DB_DATABASE_URL }}
      TF_VAR_tiffanys_space_backend_db_database_url: ${{ secrets.TIFFANYS_SPACE_BACKEND_DB_DATABASE_URL }}
      TF_VAR_fitness_app_service_key: ${{ secrets.FITNESS_APP_SERVICE_KEY }}
      TF_VAR_tiffanys_space_service_key: ${{ secrets.TIFFANYS_SPACE_SERVICE_KEY }}
      # ── Optional secrets ──────────────────────────────────────────────────
      TF_VAR_tiffanys_space_cron_secret: ${{ secrets.TIFFANYS_SPACE_CRON_SECRET }}
      TF_VAR_backend_stripe_secret_key: ${{ secrets.BACKEND_STRIPE_SECRET_KEY }}
      TF_VAR_backend_stripe_webhook_secret: ${{ secrets.BACKEND_STRIPE_WEBHOOK_SECRET }}
      # ── Per-env non-secret variables ──────────────────────────────────────
      TF_VAR_backend_url: ${{ vars.BACKEND_URL }}
      TF_VAR_fitness_app_backend_url: ${{ vars.FITNESS_APP_BACKEND_URL }}
      TF_VAR_tiffanys_space_backend_url: ${{ vars.TIFFANYS_SPACE_BACKEND_URL }}
      TF_VAR_kdf_auth_service_project_name: ${{ vars.KDF_AUTH_SERVICE_PROJECT_NAME }}
      TF_VAR_fitness_app_project_name: ${{ vars.FITNESS_APP_PROJECT_NAME }}
      TF_VAR_fitness_app_backend_project_name: ${{ vars.FITNESS_APP_BACKEND_PROJECT_NAME }}
      TF_VAR_tiffanys_space_project_name: ${{ vars.TIFFANYS_SPACE_PROJECT_NAME }}
      TF_VAR_tiffanys_space_backend_project_name: ${{ vars.TIFFANYS_SPACE_BACKEND_PROJECT_NAME }}
      # ── Optional non-secret variables ─────────────────────────────────────
      TF_VAR_kdf_auth_cors_origins: ${{ vars.KDF_AUTH_CORS_ORIGINS }}
      TF_VAR_fitness_app_backend_cors_origins: ${{ vars.FITNESS_APP_BACKEND_CORS_ORIGINS }}
      TF_VAR_tiffanys_space_backend_cors_origins: ${{ vars.TIFFANYS_SPACE_BACKEND_CORS_ORIGINS }}
      # ── Remote state auth (once a backend is configured) ──────────────────
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: v${{ inputs.version }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: "~1.9"

      - name: Terraform Init
        run: terraform -chdir="$TF_DIR" init

      - name: Terraform Validate
        run: terraform -chdir="$TF_DIR" validate

      - name: Terraform Plan
        id: plan
        # Each env root auto-loads its committed common.auto.tfvars; secrets and
        # per-env values come from the TF_VAR_* env block above. No -var-file needed.
        run: terraform -chdir="$TF_DIR" plan -out=tfplan -detailed-exitcode

      # PL-078: cross-app + production-readiness invariant gate against the REAL
      # plan, BEFORE apply (reusing the plan from the step above). The terraform
      # repo owns the OPA policies (policy/) incl. prod_guard.rego, which requires
      # an injected `environment` to discriminate prod from dev.
      #
      # ADVISORY for now (continue-on-error + prod_guard rules are `warn`, so
      # conftest exits 0 on them): it surfaces violations in the logs without ever
      # blocking a deploy while PL-014 (Upstash Redis) and PL-051 (prod Stripe) are
      # still pending. The flip-to-deny closeout removes `continue-on-error` here
      # AND flips prod_guard `warn` -> `deny` in the terraform repo, so a
      # misconfigured prod apply then fails closed at this step before Apply runs.
      #
      # SCOPE NOTE: `--all-namespaces` evaluates EVERY policy package against the
      # real plan — terraform.invariants (prod_guard + the cross-app stripe/jwt/
      # url/pii invariants) AND terraform.envvars (scope_policy). So removing
      # continue-on-error at the flip makes ALL of those existing `deny` rules
      # deploy-blocking, not only prod_guard. That is intended (every invariant
      # should hold on a valid prod plan), but is flagged here so the broader
      # enforcement at the flip is not a surprise.
      - name: Invariant policy gate (conftest, advisory)
        continue-on-error: true
        env:
          KDF_TARGET_ENV: ${{ inputs.environment }}
        run: |
          CONFTEST_VERSION="0.68.2"
          curl -sSL "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xzf - conftest
          ./conftest --version
          terraform -chdir="$TF_DIR" show -json tfplan > tfplan.json
          python3 -c "import json, os; d = json.load(open('tfplan.json')); d['environment'] = os.environ['KDF_TARGET_ENV']; json.dump(d, open('tfplan.json', 'w'))"
          ./conftest test tfplan.json --policy policy --all-namespaces

      # Only apply if plan detected changes (exit code 2 = changes present).
      # Exit code 0 = no changes, exit code 1 = error (already failed above).
      - name: Terraform Apply
        if: steps.plan.outputs.exitcode == 2
        run: terraform -chdir="$TF_DIR" apply tfplan

      - name: No changes
        if: steps.plan.outputs.exitcode == 0
        run: echo "No infrastructure changes detected — nothing to apply."
