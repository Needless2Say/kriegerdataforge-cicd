# CI — runs on every PR targeting main (opened, updated, reopened).
#
# Jobs:
#   lint   — actionlint validates all .github/workflows/*.yml files
#   test   — pytest runs the Python unit tests in scripts/tests/
#
# Both jobs must pass before a PR can be merged (configure as required
# status checks in repo Settings → Branches → main → protection rules).

name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  lint:
    name: Lint workflows (actionlint)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          curl -sfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash \
            | bash -s -- latest /usr/local/bin

      - name: Run actionlint
        run: actionlint

  test:
    name: Python unit tests
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: scripts/requirements-test.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-test.txt

      - name: Run tests
        run: cd scripts && pytest tests/ --tb=short
