# CI — runs on every PR targeting main (opened, updated, reopened).
#
# Jobs:
#   lint   — actionlint validates all .github/workflows/*.yml files
#   test   — pytest runs the Python unit tests in scripts/tests/
#
# Both jobs must pass before a PR can be merged (configure as required
# status checks in repo Settings → Branches → main → protection rules).

name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  lint:
    name: Lint workflows (actionlint)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install actionlint
        # PL-142: pin the version + verify the binary sha256 instead of piping the
        # installer script from the mutable `main` ref and installing `latest`. Bump
        # both ACTIONLINT_VERSION and ACTIONLINT_SHA256 in lockstep from the release's
        # actionlint_<ver>_checksums.txt.
        env:
          ACTIONLINT_VERSION: "1.7.12"
          ACTIONLINT_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
        run: |
          set -euo pipefail
          curl -sfL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            -o /tmp/actionlint.tar.gz
          echo "${ACTIONLINT_SHA256}  /tmp/actionlint.tar.gz" | sha256sum -c -
          tar -xzf /tmp/actionlint.tar.gz -C /usr/local/bin actionlint
          rm /tmp/actionlint.tar.gz
          actionlint -version

      - name: Run actionlint
        run: actionlint

  test:
    name: Python unit tests
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: scripts/requirements-test.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-test.txt

      - name: Run tests
        run: cd scripts && pytest tests/ --tb=short

  version-check:
    uses: Needless2Say/kriegerdataforge-cicd/.github/workflows/bump-version-check.yml@main
