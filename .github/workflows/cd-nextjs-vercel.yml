# Reusable CD workflow — Next.js → Vercel
#
# Called by consumer repos to deploy a Next.js frontend to a Vercel project.
# The `environment` input controls which GitHub Environment is activated,
# which in turn:
#   1. Requires approval from the configured reviewers (prod: owner only,
#      dev: owner + collaborator)
#   2. Loads the environment-scoped secrets (VERCEL_TOKEN, VERCEL_PROJECT_ID)
#      into the job
#
# Required environment secrets (set per environment in the caller repo):
#   VERCEL_TOKEN       — Vercel API token
#   VERCEL_ORG_ID      — Vercel team / org ID
#   VERCEL_PROJECT_ID  — Vercel project ID for the target environment
#
# Usage (consumer repo .github/workflows/cd.yml):
#   jobs:
#     deploy:
#       uses: Needless2Say/kriegerdataforge-cicd/.github/workflows/cd-nextjs-vercel.yml@main
#       with:
#         environment: ${{ inputs.environment }}
#         version: ${{ inputs.version }}
#       secrets: inherit

name: CD — Next.js → Vercel (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target GitHub Environment ("development" or "production")'
        required: true
        type: string
      version:
        description: 'Version to deploy (e.g. 1.2.0). Specify an older version to roll back.'
        required: true
        type: string

jobs:
  # ── Deployer authorization gate ───────────────────────────────────────────
  # Runs BEFORE the deploy job, and BEFORE the GitHub Environment approval is
  # requested. Verifies the user who dispatched this run is an approved deployer
  # for this repo + environment, per the central allow-list in
  # kriegerdataforge-cicd (scripts/deployer_registry.json). Fails closed.
  authorize:
    name: Authorize deployer
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - name: Check out deployer registry (kriegerdataforge-cicd)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: Needless2Say/kriegerdataforge-cicd
          ref: main
          sparse-checkout: scripts
          path: _kdf_cicd
          # Default token works when this cicd repo is public. If it is private,
          # add a repo/org secret CICD_REGISTRY_PAT (read-only) — it is picked up
          # via the caller's `secrets: inherit`; otherwise we fall back to github.token.
          token: ${{ secrets.CICD_REGISTRY_PAT || github.token }}

      - name: Verify deployer is approved
        run: python3 _kdf_cicd/scripts/check_deployer.py
        env:
          DEPLOY_REPO: ${{ github.repository }}
          DEPLOY_ACTOR: ${{ github.triggering_actor }}
          DEPLOY_ENVIRONMENT: ${{ inputs.environment }}

  deploy:
    name: Deploy (${{ inputs.environment }})
    needs: authorize
    runs-on: ubuntu-slim

    # Activates the GitHub Environment gate for the caller repo:
    # - Pauses for required reviewer approval
    # - Loads environment-scoped secrets into this job
    environment: ${{ inputs.environment }}

    permissions:
      contents: read
      id-token: write  # Required for Vercel OIDC

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: v${{ inputs.version }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel
        run: npx vercel --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
