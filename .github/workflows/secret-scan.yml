# Reusable secret-scanning workflow — gitleaks
#
# Scans a consumer repo's working tree AND full git history for committed
# secrets (API tokens, private keys, passwords, connection strings).
#
# Defence-in-depth: the audit (2026-06-05) confirmed no secrets are currently
# committed in any KDF repo, but real secret files (*.tfvars, .env.local) live
# on contributors' disks. This workflow fails the build if any secret is ever
# pushed, complementing the local pre-commit hook.
#
# Usage (consumer repo .github/workflows/ci.yml):
#   jobs:
#     secret-scan:
#       uses: Needless2Say/kriegerdataforge-cicd/.github/workflows/secret-scan.yml@main

name: Secret Scan (reusable)

on:
  workflow_call:
    inputs:
      fetch-depth:
        description: 'Git history depth to scan (0 = full history)'
        required: false
        type: number
        default: 0

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # full history so a secret committed in any past commit is caught,
          # not just the current tree
          fetch-depth: ${{ inputs.fetch-depth }}

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # no GITLEAKS_LICENSE needed for public repos / individual use
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
