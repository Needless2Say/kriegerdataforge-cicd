# Reusable CD workflow — Python FastAPI → Vercel
#
# Called by consumer repos to deploy the FastAPI backend to a Vercel project.
# The `environment` input controls which GitHub Environment is activated,
# which in turn:
#   1. Requires approval from the configured reviewers (prod: owner only,
#      dev: owner + collaborator)
#   2. Loads the environment-scoped secrets (VERCEL_TOKEN, VERCEL_PROJECT_ID,
#      DB_DATABASE_URL) into the job
#
# Deploy steps:
#   1. Compact api/ into vercel_api/app/ via vercel_compactor.py
#   2. Deploy vercel_api/ to the target Vercel project via CLI
#   3. Optionally run Alembic migrations against DB_DATABASE_URL
#
# Required environment secrets (set per environment in the caller repo):
#   VERCEL_TOKEN       — Vercel API token
#   VERCEL_ORG_ID      — Vercel team / org ID
#   VERCEL_PROJECT_ID  — Vercel project ID for the target environment
#   DB_DATABASE_URL    — SQLAlchemy connection string (required if run_migrations=true)
#
# Usage (consumer repo .github/workflows/cd.yml):
#   jobs:
#     deploy:
#       uses: Needless2Say/kriegerdataforge-cicd/.github/workflows/cd-python-vercel.yml@main
#       with:
#         environment: ${{ inputs.environment }}
#       secrets: inherit

name: CD — Python → Vercel (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target GitHub Environment ("development" or "production")'
        required: true
        type: string
      run_migrations:
        description: 'Run "alembic upgrade head" after deployment'
        required: false
        type: string
        default: 'true'

jobs:
  deploy:
    name: Deploy (${{ inputs.environment }})
    runs-on: ubuntu-latest

    # Activates the GitHub Environment gate for the caller repo:
    # - Pauses for required reviewer approval
    # - Loads environment-scoped secrets into this job
    environment: ${{ inputs.environment }}

    permissions:
      contents: read
      id-token: write  # Required for Vercel OIDC

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Compact API for Vercel
        run: python scripts/vercel_compactor.py

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        working-directory: vercel_api
        run: NODE_OPTIONS="--require ./dns-preload.js" vercel --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Run Alembic migrations
        if: inputs.run_migrations == 'true'
        run: alembic upgrade head
        env:
          DB_DATABASE_URL: ${{ secrets.DB_DATABASE_URL }}
