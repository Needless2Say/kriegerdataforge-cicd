# Reusable CD workflow — Python FastAPI → Vercel
#
# Called by consumer repos to deploy the FastAPI backend to a Vercel project.
# The `environment` input controls which GitHub Environment is activated,
# which in turn:
#   1. Requires approval from the configured reviewers (prod: owner only,
#      dev: owner + collaborator)
#   2. Loads its secrets. A job with `environment:` reads repository AND environment
#      secrets together, so the two singular tokens live at REPOSITORY level (one value
#      everywhere) while the genuinely per-env values stay environment-scoped.
#
# Deploy steps:
#   1. Compact api/ into vercel_api/app/ via vercel_compactor.py
#   2. Deploy vercel_api/ to the target Vercel project via CLI
#   3. Optionally run Alembic migrations against DB_DATABASE_URL
#
# Repository secrets (one global value — set at repo level, NOT per environment):
#   VERCEL_DEPLOYMENT_TOKEN — shared Vercel deploy/management token
#   GH_PACKAGES_PAT    — GitHub PAT (repo read scope) for installing kdf-auth-sdk
# Environment secrets (set per environment in the caller repo):
#   VERCEL_ORG_ID      — Vercel team / org ID
#   VERCEL_PROJECT_ID  — Vercel project ID for the target environment
#   DB_DATABASE_URL    — SQLAlchemy connection string (required if run_migrations=true)
#
# Usage (consumer repo .github/workflows/cd.yml):
#   jobs:
#     deploy:
#       uses: Needless2Say/kriegerdataforge-cicd/.github/workflows/cd-python-vercel.yml@main
#       with:
#         environment: ${{ inputs.environment }}
#         version: ${{ inputs.version }}
#       secrets: inherit

name: CD — Python → Vercel (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target GitHub Environment ("dev" or "prod")'
        required: true
        type: string
      run_migrations:
        description: 'Run "alembic upgrade head" after deployment'
        required: false
        type: string
        default: 'true'
      version:
        description: 'Version to deploy (e.g. 1.2.0). Specify an older version to roll back.'
        required: true
        type: string

jobs:
  # ── Deployer authorization gate ───────────────────────────────────────────
  # Runs BEFORE the deploy job, and BEFORE the GitHub Environment approval is
  # requested. Verifies the user who dispatched this run is an approved deployer
  # for this repo + environment, per the central allow-list in
  # kriegerdataforge-cicd (scripts/deployer_registry.json). Fails closed.
  authorize:
    name: Authorize deployer
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - name: Check out deployer registry (kriegerdataforge-cicd)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Needless2Say/kriegerdataforge-cicd
          ref: main
          sparse-checkout: scripts
          path: _kdf_cicd
          # The cicd repo is public, so the caller's default github.token can read it.
          # (If cicd ever goes private, this checkout needs a read-only token with access
          # to it — see KDF docs/engineering/GITHUB_FUTURE_ENHANCEMENTS.md.)
          token: ${{ github.token }}

      - name: Verify deployer is approved
        run: python3 _kdf_cicd/scripts/check_deployer.py
        env:
          DEPLOY_REPO: ${{ github.repository }}
          DEPLOY_ACTOR: ${{ github.triggering_actor }}
          DEPLOY_ENVIRONMENT: ${{ inputs.environment }}

  deploy:
    name: Deploy (${{ inputs.environment }})
    needs: authorize
    runs-on: ubuntu-slim

    # Activates the GitHub Environment gate for the caller repo:
    # - Pauses for required reviewer approval
    # - Loads environment-scoped secrets into this job
    environment: ${{ inputs.environment }}

    permissions:
      contents: read
      id-token: write  # Required for Vercel OIDC

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: v${{ inputs.version }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          git config --global url."https://__token__:${GH_PACKAGES_PAT}@github.com/".insteadOf "https://github.com/"
          pip install -r requirements.txt
        env:
          GH_PACKAGES_PAT: ${{ secrets.GH_PACKAGES_PAT }}

      - name: Compact API for Vercel
        run: python scripts/vercel_compactor.py

      - name: Validate Vercel project binding
        run: |
          if [ -z "${VERCEL_PROJECT_ID:-}" ]; then
            echo "❌  VERCEL_PROJECT_ID is not set in the GitHub Environment."
            echo "    Without it the Vercel CLI falls back to org-wide project discovery"
            echo "    and may deploy to the wrong project or trigger other projects."
            echo "    Set VERCEL_PROJECT_ID in the '${{ inputs.environment }}' environment"
            echo "    secrets for this repo and re-run."
            exit 1
          fi
          echo "✅  Deploying to Vercel project: $VERCEL_PROJECT_ID"
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Install Vercel CLI
        # Pin the Vercel CLI to an exact version: this job holds VERCEL_DEPLOYMENT_TOKEN,
        # GH_PACKAGES_PAT and (on migrations) DB_DATABASE_URL, so an unpinned
        # install floating to the latest registry tarball is a poisoned-pipeline
        # / dependency-chain risk (CICD-SEC-3 / SLSA). Bump via Dependabot.
        run: npm install -g vercel@48.0.0

      - name: Deploy to Vercel
        working-directory: vercel_api
        run: |
          # A VERCEL_DEPLOYMENT_TOKEN env secret pasted by hand often carries a trailing newline/space, which
          # the Vercel CLI rejects ("The specified token is not valid") even though the token itself is valid.
          # Strip whitespace, fail fast if empty, and pass it explicitly via --token. (Only the LENGTH is
          # logged for debugging — the token value is never printed.)
          TOKEN="$(printf '%s' "$VERCEL_DEPLOYMENT_TOKEN" | tr -d '[:space:]')"
          if [ -z "$TOKEN" ]; then
            echo "::error::VERCEL_DEPLOYMENT_TOKEN is empty in the '${{ inputs.environment }}' environment — set the VERCEL_DEPLOYMENT_TOKEN environment secret on this repo (correct environment)."
            exit 1
          fi
          echo "VERCEL_DEPLOYMENT_TOKEN trimmed length=${#TOKEN}; org=${VERCEL_ORG_ID}; project=${VERCEL_PROJECT_ID}"
          NODE_OPTIONS="--require ./dns-preload.js" vercel --prod --yes \
            --token "$TOKEN" \
            --build-env "GH_PACKAGES_PAT=$GH_PACKAGES_PAT"
        env:
          VERCEL_DEPLOYMENT_TOKEN: ${{ secrets.VERCEL_DEPLOYMENT_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          GH_PACKAGES_PAT: ${{ secrets.GH_PACKAGES_PAT }}

      # psycopg2 (the source build pinned in requirements, not psycopg2-binary)
      # links libpq dynamically and needs libpq.so.5 at import time. The slim
      # runner image does not ship it (Vercel's runtime does, so the deployed app
      # is unaffected), so install the runtime library before Alembic imports the
      # driver. Guarded to the migration path so non-migrating deploys skip it.
      - name: Install libpq (psycopg2 runtime dependency)
        if: inputs.run_migrations == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpq5

      - name: Run Alembic migrations
        if: inputs.run_migrations == 'true'
        run: alembic upgrade head
        env:
          DB_DATABASE_URL: ${{ secrets.DB_DATABASE_URL }}
