name: Distribute GH_PACKAGES_PAT

on:
  # Manual only — triggered after you create a new fine-grained PAT and store it
  # as GH_PACKAGES_PAT_NEW in kriegerdataforge-cicd repo-level secrets.
  #
  # Full rotation flow:
  #   1. Create a new fine-grained PAT at github.com/settings/tokens
  #      Name: "kdf-packages-read"
  #      Expiration: 1 year
  #      Repository access: kriegerdataforge-python-sdk only
  #      Permission: Contents → Read-only
  #   2. Go to kriegerdataforge-cicd → Settings → Secrets and variables → Actions
  #      Add (or update) a secret named GH_PACKAGES_PAT_NEW with the new token value.
  #   3. Run this workflow (Actions → Distribute GH_PACKAGES_PAT → Run workflow).
  #   4. After it succeeds, update the GH_PACKAGES_PAT check.expiry in scripts/secret_registry.json
  #      to the new expiry date (YYYY-MM-DD) and commit the change.
  #   5. Delete the GH_PACKAGES_PAT_NEW secret (it is no longer needed).
  #   6. Optionally revoke the old PAT: github.com/settings/tokens → find old token → Revoke.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  authorize:
    uses: ./.github/workflows/_authorize-owner.yml

  distribute:
    name: Distribute GH_PACKAGES_PAT
    needs: authorize
    # Fail-closed owner gate (PL-076 parity): the reusable gate exit 1s on a non-owner (so the
    # implicit needs-success requirement skips this job) AND we re-assert its explicit output.
    if: needs.authorize.outputs.authorized == 'true'
    runs-on: ubuntu-slim

    # No GitHub Environment — uses repo-level secrets only.
    # GH_PACKAGES_PAT_NEW and CICD_PAT must be set as repo-level secrets on
    # kriegerdataforge-cicd before triggering this workflow.

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # Short-lived GitHub App installation token (auto-revoked at job end; effective lifetime =
      # job runtime, not the 1-hour nominal TTL). Downscoped to secrets:write — PL-107:
      # GH_PACKAGES_PAT now lives ONLY as a REPOSITORY-level Actions secret (github_repo_secrets)
      # on the four SDK-consuming repos, and repository secrets are gated by the "Secrets"
      # permission, NOT "Environments" (the registry entry has no github_env_secrets). Gated on
      # USE_GITHUB_APP, falls back to CICD_PAT.
      - name: Mint GitHub App token
        id: app-token
        if: vars.USE_GITHUB_APP == 'true'
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.KDF_APP_ID }}
          private-key: ${{ secrets.KDF_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-secrets: write

      - name: Distribute new PAT
        env:
          # The staged new PAT (created in the GitHub UI) feeds the engine's paste mode.
          STAGED_SECRET_VALUE: ${{ secrets.GH_PACKAGES_PAT_NEW }}
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.CICD_PAT }}
          VERCEL_MASTER_TOKEN: ${{ secrets.VERCEL_MASTER_TOKEN }}
        run: python scripts/rotate_secret.py --mode paste --secrets GH_PACKAGES_PAT
