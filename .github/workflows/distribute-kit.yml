name: Distribute Agentic-Workflow Kit

# Propagates the canonical kit (kit/common/) to consumer repos via distribute_kit.py.
# See ADR D-001 / kriegerdataforge/docs/epics/agent-kit-distribution.md.
#
#   • workflow_dispatch — run on demand. 'check' (read-only drift report) or
#     'distribute' (open one sync PR per drifted repo; never auto-merges).
#   • schedule — weekly read-only drift alarm: a failed run = some repo drifted
#     from the canonical kit.
#
# Before the first 'distribute', each consumer repo's version-check must exempt the
# kit paths (ADR D-001 option B — shipped in scripts/common/check_version.py).

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "check (read-only drift report) or distribute (open sync PRs)"
        type: choice
        options:
          - check
          - distribute
        default: check
      only:
        description: "Optional: only this kit file (e.g. skills.md). Blank = all kit files."
        type: string
        default: ""
      repos:
        description: "Optional: comma-separated EXACT repo names to target (e.g. 'kriegerdataforge-sdk, fitness-app-backend'). Blank = all repos in the registry. Run 'check' first to preview the list."
        type: string
        default: ""
  schedule:
    - cron: "0 12 * * 1" # Mondays 12:00 UTC — weekly drift alarm (check only)

permissions:
  contents: read

jobs:
  authorize:
    # Only dispatched runs are actor-attributable; the weekly schedule has no human actor to
    # match against the owner, so gate dispatches only (fail-closed for the privileged path).
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_authorize-owner.yml

  distribute-kit:
    name: Distribute kit
    needs: authorize
    # Never run on forks (this repo is public). For a dispatch, require the owner gate to pass
    # (PL-076 parity, fail-closed); the read-only weekly schedule has no authorize job (skipped),
    # so allow it through. always() lets this job evaluate even though authorize is skipped on
    # schedule; the explicit success() check below preserves fail-closed on dispatch.
    if: >-
      always() &&
      github.repository == 'Needless2Say/kriegerdataforge-cicd' &&
      (github.event_name != 'workflow_dispatch' ||
        (needs.authorize.result == 'success' && needs.authorize.outputs.authorized == 'true'))
    runs-on: ubuntu-slim

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # Short-lived GitHub App installation token (auto-revoked at job end; effective lifetime =
      # job runtime, not the 1-hour nominal TTL). Downscoped to contents + pull-requests write —
      # what distribute_kit needs to push a sync branch and open a PR. Gated on USE_GITHUB_APP,
      # falls back to CICD_PAT.
      - name: Mint GitHub App token
        id: app-token
        if: vars.USE_GITHUB_APP == 'true'
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.KDF_APP_ID }}
          private-key: ${{ secrets.KDF_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write
          permission-pull-requests: write

      - name: Run distribute_kit
        env:
          # The token needs contents:read (check) + contents & pull-requests:write (distribute)
          # on the target repos.
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.CICD_PAT }}
          MODE: ${{ github.event.inputs.mode || 'check' }}
          ONLY: ${{ github.event.inputs.only }}
          REPOS: ${{ github.event.inputs.repos }}
        run: |
          ARGS=("$MODE")
          if [ -n "$ONLY" ]; then
            ARGS+=(--only "$ONLY")
          fi
          if [ -n "$REPOS" ]; then
            ARGS+=(--repos "$REPOS")
          fi
          echo "Running: distribute_kit.py ${ARGS[*]}"
          python scripts/distribute_kit.py "${ARGS[@]}"
