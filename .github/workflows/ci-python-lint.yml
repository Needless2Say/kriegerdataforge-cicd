name: Python · Lint (ruff)

on:
  workflow_call:
    inputs:
      python_version:
        description: Python version to use
        type: string
        default: "3.13"
      install_command:
        description: Command to install dependencies before linting
        type: string
        default: "pip install -r requirements.txt"
      lint_command:
        description: Full ruff check command to run
        type: string
        default: "python -m ruff check ."
      needs_sdk_auth:
        description: Configure git credentials for the private SDK (requires GH_PACKAGES_PAT secret)
        type: boolean
        default: false

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Configure private SDK access
        if: ${{ inputs.needs_sdk_auth }}
        env:
          GH_PACKAGES_PAT: ${{ secrets.GH_PACKAGES_PAT }}
        run: git config --global url."https://__token__:${GH_PACKAGES_PAT}@github.com/".insteadOf "https://github.com/"

      # The slim runner lacks libpq, so psycopg2 (built from source — it ships
      # no manylinux wheels) fails with "pg_config executable not found".
      # Provide the build dependency so `pip install -r requirements.txt` works.
      - name: Install libpq (psycopg2 build dependency)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libpq-dev

      - name: Install dependencies
        run: ${{ inputs.install_command }}

      - name: Run ruff check
        run: ${{ inputs.lint_command }}
