# Issue Assistant — Create New Repository
#
# Triggered when the `new-repo` label is added to an issue that was opened
# using the new-repo issue form. Parses the form fields, creates a repo from
# the appropriate template, configures GitHub Environments, enables branch
# protection, and comments with the remaining manual checklist.
#
# Required repo-level secret (not environment-scoped):
#   CICD_PAT — fine-grained GitHub PAT with the following permissions:
#     Repository: Administration (R/W), Contents (R/W), Environments (R/W),
#                 Secrets (R/W), Variables (R/W), Actions (R/W)
#     Account:    Members (Read)
#
# NOTE — CICD_PAT holdout. The rotation/kit workflows have moved to ephemeral GitHub App
# tokens (docs/design/github-app-migration.md). This provisioner stays on CICD_PAT for now
# because creating a repo under a *personal account* needs a user-to-server PAT — a GitHub App
# installation token cannot create user-account repos. It moves to the App after the planned
# org move (then the App's org-level Administration permission can create repos). It is the last
# CICD_PAT consumer; owner-only and rarely run, so the residual blast radius is minimal.
#
# Template repos that must exist before this workflow is useful:
#   Needless2Say/kriegerdataforge-template-nextjs
#   Needless2Say/kriegerdataforge-template-fastapi
#   Needless2Say/kriegerdataforge-template-npm-package
#   Needless2Say/kriegerdataforge-template-python-package
#
# See docs/MANUAL_SETUP.md — Phase 10 & 11 for setup instructions.

name: Issue Assistant — Create Repo

on:
  issues:
    types:
      - labeled

permissions:
  contents: read
  issues: write

jobs:
  # ── Actor authorization (PL-076) ──────────────────────────────────────────────
  # `issues: labeled` can be fired by anyone with Triage/Write access, yet every
  # step below runs with CICD_PAT (org Administration + Secrets:write). Without an
  # actor check, any collaborator who can add the `new-repo` label could provision
  # repos and write secrets org-wide — bypassing the owner-only deploy gate the CD
  # workflows enforce via check_deployer.py. Fail closed (exit 1, loud DENIED, in
  # the same spirit as check_deployer.py) unless the triggering actor is the
  # repository owner. `create-repo` `needs:` this job, so a denied/skip result
  # short-circuits the privileged steps. The actor / repository_owner comparison
  # is case-insensitive (GitHub logins are case-insensitive) and is not hard-coded
  # to a username.
  #
  # Actor source: github.triggering_actor (NOT github.event.sender.login) to match
  # check_deployer.py and the CD workflows, and so a manual "Re-run jobs" is
  # attributed to whoever re-ran it (the stored event payload's sender is frozen
  # to the original labeler on a re-run). The `if:` also pins the event action to
  # `labeled` so only a label-add — not some other issue event carrying the label —
  # can reach the gate.
  #
  # Owner follow-up (config, not code): scope CICD_PAT down to the minimum the
  # provisioning steps need — it currently carries org-wide Administration +
  # Secrets:write.
  authorize:
    name: Authorize issue actor
    runs-on: ubuntu-slim
    if: github.event.action == 'labeled' && github.event.label.name == 'new-repo'
    permissions:
      contents: read
    steps:
      - name: Verify the triggering actor is the repository owner
        env:
          ACTOR: ${{ github.triggering_actor }}
          OWNER: ${{ github.repository_owner }}
        run: |
          actor_lc="$(echo "$ACTOR" | tr '[:upper:]' '[:lower:]')"
          owner_lc="$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')"
          if [[ -z "$actor_lc" || "$actor_lc" != "$owner_lc" ]]; then
            echo "::error::DENIED: '${ACTOR}' is not the repository owner ('${OWNER}'). Only the owner may provision repositories (this workflow uses CICD_PAT with org Administration + Secrets:write). Failing closed."
            exit 1
          fi
          echo "OK: '${ACTOR}' is the repository owner — authorized to provision repositories."

  create-repo:
    name: Create repository from template
    runs-on: ubuntu-slim
    needs: authorize

    # only run when the new repo label is added AND the actor is authorized (the
    # `needs: authorize` failure on a non-owner short-circuits this job)
    if: github.event.label.name == 'new-repo'

    steps:
      - name: Parse issue form body
        id: parse
        uses: peter-murray/issue-forms-body-parser@22e5d90e6a607073d08891bc036461971cbcfb45 # v4
        with:
          issue_id: ${{ github.event.issue.number }}
          separator: "###"
          label_marker_start: ">>"
          label_marker_end: "<<"

      - name: Extract fields
        id: fields
        env:
          PAYLOAD: ${{ steps.parse.outputs.payload }}
        run: |
          {
            echo "repo_name=$(echo "$PAYLOAD" | jq -r '."Repository Name"')"
            echo "repo_type=$(echo "$PAYLOAD" | jq -r '."Repository Type"')"
            echo "visibility=$(echo "$PAYLOAD" | jq -r '.Visibility')"
            echo "description=$(echo "$PAYLOAD" | jq -r '.Description')"
          } >> "$GITHUB_OUTPUT"

      - name: Validate fields
        env:
          REPO_NAME: ${{ steps.fields.outputs.repo_name }}
          REPO_TYPE: ${{ steps.fields.outputs.repo_type }}
          VISIBILITY: ${{ steps.fields.outputs.visibility }}
        run: |
          if [[ -z "$REPO_NAME" || "$REPO_NAME" == "null" ]]; then
            echo "::error::repo_name is required"
            exit 1
          fi
          if [[ ! "$REPO_NAME" =~ ^[a-z0-9-]+$ ]]; then
            echo "::error::repo_name must contain only lowercase letters, numbers, and hyphens"
            exit 1
          fi
          case "$REPO_TYPE" in
            nextjs|fastapi|npm-package|python-package) ;;
            *)
              echo "::error::repo_type must be one of: nextjs, fastapi, npm-package, python-package"
              exit 1
              ;;
          esac
          # Allow-list visibility — it flows into the repo-creation API call, so
          # constrain it to the two valid values rather than trusting the form.
          case "$VISIBILITY" in
            public|private) ;;
            *)
              echo "::error::visibility must be 'public' or 'private' (got '${VISIBILITY}')"
              exit 1
              ;;
          esac

      - name: Create repository from template
        env:
          GH_TOKEN: ${{ secrets.CICD_PAT }}
          REPO_NAME: ${{ steps.fields.outputs.repo_name }}
          REPO_TYPE: ${{ steps.fields.outputs.repo_type }}
          VISIBILITY: ${{ steps.fields.outputs.visibility }}
          DESCRIPTION: ${{ steps.fields.outputs.description }}
        run: |
          TEMPLATE="kriegerdataforge-template-${REPO_TYPE}"
          echo "Creating Needless2Say/${REPO_NAME} from template Needless2Say/${TEMPLATE}"
          if [[ "$VISIBILITY" == "private" ]]; then PRIVATE="true"; else PRIVATE="false"; fi
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/Needless2Say/${TEMPLATE}/generate" \
            -f owner="Needless2Say" \
            -f name="${REPO_NAME}" \
            -f description="${DESCRIPTION}" \
            -F "private=${PRIVATE}" \
            -F include_all_branches=false
          # Wait for repo to be fully created before configuring it
          sleep 5

      - name: Configure production environment
        env:
          GH_TOKEN: ${{ secrets.CICD_PAT }}
          REPO_NAME: ${{ steps.fields.outputs.repo_name }}
        run: |
          # Get owner user ID for required reviewer
          OWNER_ID=$(gh api /users/Needless2Say --jq '.id')
          # Create production environment with owner-only approval gate
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "/repos/Needless2Say/${REPO_NAME}/environments/prod" \
            -F "wait_timer=0" \
            --input - <<EOF
          {
            "reviewers": [{"type": "User", "id": ${OWNER_ID}}],
            "deployment_branch_policy": {
              "protected_branches": false,
              "custom_branch_policies": true
            }
          }
          EOF
          # Set deployment branch to main only
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/Needless2Say/${REPO_NAME}/environments/prod/deployment-branch-policies" \
            -f name="main" \
            -f type="branch"

      - name: Configure development environment
        env:
          GH_TOKEN: ${{ secrets.CICD_PAT }}
          REPO_NAME: ${{ steps.fields.outputs.repo_name }}
        run: |
          OWNER_ID=$(gh api /users/Needless2Say --jq '.id')
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "/repos/Needless2Say/${REPO_NAME}/environments/dev" \
            -F "wait_timer=0" \
            --input - <<EOF
          {
            "reviewers": [{"type": "User", "id": ${OWNER_ID}}],
            "deployment_branch_policy": {
              "protected_branches": false,
              "custom_branch_policies": true
            }
          }
          EOF
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/Needless2Say/${REPO_NAME}/environments/dev/deployment-branch-policies" \
            -f name="main" \
            -f type="branch"

      - name: Enable branch protection on main (skipped on free-tier private repos)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.CICD_PAT }}
          REPO_NAME: ${{ steps.fields.outputs.repo_name }}
        run: |
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "/repos/Needless2Say/${REPO_NAME}/branches/main/protection" \
            --input - <<'EOF'
          {
            "required_status_checks": null,
            "enforce_admins": false,
            "required_pull_request_reviews": {
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": false,
              "required_approving_review_count": 1
            },
            "restrictions": null,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "block_creations": false
          }
          EOF

      - name: Post completion comment
        env:
          GH_TOKEN: ${{ secrets.CICD_PAT }}
          REPO_NAME: ${{ steps.fields.outputs.repo_name }}
          REPO_TYPE: ${{ steps.fields.outputs.repo_type }}
          VISIBILITY: ${{ steps.fields.outputs.visibility }}
        run: |
          REPO_URL="https://github.com/Needless2Say/${REPO_NAME}"
          gh issue comment ${{ github.event.issue.number }} \
            --repo Needless2Say/kriegerdataforge-cicd \
            --body "## ✅ Repository Created

          **Repository:** [${REPO_NAME}](${REPO_URL})
          **Type:** \`${REPO_TYPE}\`
          **Visibility:** \`${VISIBILITY}\`

          ### Automated setup complete
          - [x] Repository created from \`kriegerdataforge-template-${REPO_TYPE}\`
          - [x] \`prod\` environment created (owner-only approval gate, main branch only)
          - [x] \`dev\` environment created (owner approval gate, main branch only)
          - [~] Branch protection on \`main\` — skipped on free-tier private repos (enable manually after upgrading to GitHub Organization)

          ### Manual steps required

          **Collaborator access** (after friend accepts the org invite):
          - [ ] Settings → Collaborators → add friend with Write role
          - [ ] Settings → Environments → \`dev\` → Required reviewers → add friend

          **Environment secrets** (Settings → Environments → [env] → Add secret):

          \`prod\` environment:
          - [ ] \`VERCEL_TOKEN\` — your Vercel API token
          - [ ] \`VERCEL_ORG_ID\` — your Vercel team ID
          - [ ] \`VERCEL_PROJECT_ID\` — Vercel project ID for the **prod** deployment
          $([ "$REPO_TYPE" = "fastapi" ] && echo "- [ ] \`DB_DATABASE_URL\` — prod Neon connection string")

          \`dev\` environment:
          - [ ] \`VERCEL_TOKEN\` — your Vercel API token
          - [ ] \`VERCEL_ORG_ID\` — your Vercel team ID
          - [ ] \`VERCEL_PROJECT_ID\` — Vercel project ID for the **dev** deployment
          $([ "$REPO_TYPE" = "fastapi" ] && echo "- [ ] \`DB_DATABASE_URL\` — dev Neon connection string")

          **CI status checks** (Settings → Branches → \`main\` protection → Edit → Required status checks):
          - [ ] Add the CI job names from \`.github/workflows/ci.yml\` once the first CI run completes

          **Vercel project** (Vercel dashboard):
          - [ ] Create the Vercel project and link it to this repo
          - [ ] Disable git auto-deploy on the Vercel project
          - [ ] Copy the project ID to the environment secrets above"

      - name: Close issue
        env:
          GH_TOKEN: ${{ secrets.CICD_PAT }}
        run: |
          gh issue close ${{ github.event.issue.number }} \
            --repo Needless2Say/kriegerdataforge-cicd \
            --comment "Closing — automated setup complete. See the checklist above for remaining manual steps."
