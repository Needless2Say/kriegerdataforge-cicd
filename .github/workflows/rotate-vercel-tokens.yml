name: Distribute Vercel token (paste)

# Vercel deploy/management tokens must be scoped to the team ("Arthur's projects"), and Vercel's token
# API (/v3/user/tokens) can ONLY mint personal-account tokens — which Vercel rejects ("token is not
# valid") for team projects, even when created with a teamId. So these tokens are created BY HAND in the
# Vercel UI and distributed here (paste), exactly like GH_PACKAGES_PAT. There is no auto-rotation cron for
# the same reason — the expiry monitor reminds you to rotate.
#
# Flow:
#   1. Vercel UI → Settings → Tokens → Create Token, **Scope = your team** ("Arthur's projects").
#   2. Stage it as the matching kriegerdataforge-cicd repo secret:
#        VERCEL_TOKEN      -> VERCEL_TOKEN_NEW
#        VERCEL_API_TOKEN  -> VERCEL_API_TOKEN_NEW
#   3. Run this workflow, picking the secret. It writes the staged token to every target in
#      scripts/secret_registry.json for that secret.
#   4. Update that secret's check.expiry in scripts/secret_registry.json; delete the *_NEW slot.

on:
  workflow_dispatch:
    inputs:
      secret:
        description: "Which Vercel secret to distribute (stage its value in <SECRET>_NEW first)."
        required: true
        default: "VERCEL_TOKEN"
        type: choice
        options:
          - VERCEL_TOKEN
          - VERCEL_API_TOKEN

permissions:
  contents: read

jobs:
  authorize:
    uses: ./.github/workflows/_authorize-owner.yml

  distribute:
    name: Distribute Vercel token
    needs: authorize
    # Fail-closed owner gate (PL-076 parity): the reusable gate exit 1s on a non-owner (so the implicit
    # needs-success requirement skips this job) AND we re-assert its explicit output.
    if: needs.authorize.outputs.authorized == 'true'
    runs-on: ubuntu-slim

    # No GitHub Environment — uses repo-level secrets only (VERCEL_TOKEN_NEW / VERCEL_API_TOKEN_NEW
    # staged by the owner; the App token or CICD_PAT writes the consumer repos' environment secrets).

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # Short-lived GitHub App installation token (auto-revoked at job end). Downscoped to
      # environments:write — env secrets are gated by "Environments", not "Secrets". Falls back to CICD_PAT.
      - name: Mint GitHub App token
        id: app-token
        if: vars.USE_GITHUB_APP == 'true'
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.KDF_APP_ID }}
          private-key: ${{ secrets.KDF_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-environments: write

      - name: Distribute the staged token
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.CICD_PAT }}
          SECRET: ${{ inputs.secret }}
          # The staged team-scoped token (created in the Vercel UI). Only the matching one is read.
          VERCEL_TOKEN_NEW: ${{ secrets.VERCEL_TOKEN_NEW }}
          VERCEL_API_TOKEN_NEW: ${{ secrets.VERCEL_API_TOKEN_NEW }}
        run: |
          if [ "$SECRET" = "VERCEL_API_TOKEN" ]; then
            STAGED="$VERCEL_API_TOKEN_NEW"
          else
            STAGED="$VERCEL_TOKEN_NEW"
          fi
          if [ -z "$STAGED" ]; then
            echo "::error::Stage the team-scoped token in the ${SECRET}_NEW repo secret first."
            exit 1
          fi
          STAGED_SECRET_VALUE="$STAGED" python scripts/rotate_secret.py --mode paste --secrets "$SECRET"
