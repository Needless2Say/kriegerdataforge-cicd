name: Rotate Vercel Deployment Token

on:
  # Monthly auto-rotation: first of every month at 09:00 UTC. The new Vercel token is created with a
  # 45-day expiry, so a monthly cadence (worst-case 31-day gap) leaves ~2 weeks of slack — a single
  # missed run never expires the token. This rotates the ONE shared Vercel token
  # (VERCEL_DEPLOYMENT_TOKEN) used by every app repo's CI to deploy AND by the terraform repo to
  # manage Vercel — consolidated 2026-06-30 from the former VERCEL_TOKEN + VERCEL_API_TOKEN split
  # because both were the same account-scoped token.
  #
  # NOTE (verified 2026-06-30): the token is minted team-scoped via the teamId query param
  # (VERCEL_TEAM_ID, = VERCEL_ORG_ID). An API-minted teamId token authenticates AND deploys team
  # projects (curl /v2/user + /v9/projects both 200). The earlier "Vercel can't auto-mint team tokens"
  # belief was wrong — it was a deploy-script bug (the CLI needs an explicit --token, fixed in
  # cd-*-vercel.yml). Keep this on generate; do NOT switch back to manual paste.
  schedule:
    - cron: "0 9 1 * *"

  # allow manual trigger (no inputs — there is a single token to rotate)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  authorize:
    # Only dispatched runs have a human actor to authorize. A scheduled (cron) run's
    # github.triggering_actor is the last editor/enabler of the schedule, NOT necessarily the owner,
    # so gating the cron on the owner check would fail-closed and silently skip the rotation —
    # eventually expiring the one shared deploy token. Gate dispatches only (same as distribute-kit).
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_authorize-owner.yml

  rotate:
    name: Rotate Vercel deployment token
    needs: authorize
    # Fail-closed owner gate for dispatches (PL-076 parity); the read-only/trusted cron path has no
    # authorize job (skipped), so allow it through. always() lets this job evaluate even when
    # authorize is skipped on schedule; the explicit success() check preserves fail-closed on dispatch.
    if: >-
      always() &&
      github.repository == 'Needless2Say/kriegerdataforge-cicd' &&
      (github.event_name != 'workflow_dispatch' ||
        (needs.authorize.result == 'success' && needs.authorize.outputs.authorized == 'true'))
    runs-on: ubuntu-slim

    # No GitHub Environment — uses repo-level secrets only
    # VERCEL_MASTER_TOKEN and CICD_PAT are stored as repo-level secrets
    # on kriegerdataforge-cicd (Settings → Secrets and variables → Actions)

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - name: Install rotation dependencies
        run: pip install -r scripts/requirements.txt

      # Short-lived GitHub App installation token (auto-revoked at job end; effective lifetime =
      # job runtime, not the 1-hour nominal TTL). Two grants:
      #   * secrets: write      — write the shared VERCEL_DEPLOYMENT_TOKEN as a REPOSITORY secret in
      #                           every target repo (it is one global value, no longer per-env).
      #   * environments: write — DELETE the retired per-environment copies so they can't shadow the
      #                           repo value (env wins over repo).
      # Gated on USE_GITHUB_APP, falls back to CICD_PAT.
      - name: Mint GitHub App token
        id: app-token
        if: vars.USE_GITHUB_APP == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.KDF_APP_ID }}
          private-key: ${{ secrets.KDF_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-secrets: write
          permission-environments: write

      - name: Rotate token
        env:
          VERCEL_MASTER_TOKEN: ${{ secrets.VERCEL_MASTER_TOKEN }}
          # Scopes the minted token to the Vercel team (the VERCEL_ORG_ID value) — without it the token
          # is personal-scoped and Vercel rejects it for team projects.
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.CICD_PAT }}
        run: |
          python scripts/rotate_secret.py \
            --mode generate \
            --secrets VERCEL_DEPLOYMENT_TOKEN

  # After a successful mint, record the new token's expiry (today + 45d) in the registry and open a
  # PR on this repo so the weekly expiry monitor stays accurate without anyone editing the registry by
  # hand. Uses a SEPARATE App token scoped to contents+pull-requests:write (the rotate job's token is
  # environments:write only). The PR is opened with the App token — NOT GITHUB_TOKEN — so its CI runs
  # (a GITHUB_TOKEN-authored PR does not trigger workflows). Only the auto-minted Vercel token is
  # stamped; the manual PATs keep their hand-set expiry.
  open-expiry-pr:
    name: Open expiry-bump PR
    needs: rotate
    if: >-
      needs.rotate.result == 'success' &&
      github.repository == 'Needless2Say/kriegerdataforge-cicd'
    runs-on: ubuntu-slim
    permissions:
      contents: read # the branch push + PR are done with the App token (or CICD_PAT), not GITHUB_TOKEN

    steps:
      - name: Mint GitHub App token (PR scope)
        id: app-token
        if: vars.USE_GITHUB_APP == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.KDF_APP_ID }}
          private-key: ${{ secrets.KDF_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
          # push the bot branch as the App (or CICD_PAT) so the PR's CI is triggered
          token: ${{ steps.app-token.outputs.token || secrets.CICD_PAT }}

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - name: Install rotation dependencies
        run: pip install -r scripts/requirements.txt

      - name: Stamp today+45d into the registry
        run: python scripts/rotate_secret.py --mode record-expiry --secrets VERCEL_DEPLOYMENT_TOKEN

      - name: Open a PR if the expiry changed
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.CICD_PAT }}
        run: |
          set -euo pipefail
          if git diff --quiet scripts/secret_registry.json; then
            echo "Registry expiry already current — no PR needed."
            exit 0
          fi

          # The bot PR must satisfy version-check (VERSION = main + 1 patch).
          git fetch origin main --depth=1
          BASE="$(git show origin/main:VERSION | tr -d '[:space:]')"
          IFS=. read -r MA MI PA <<< "$BASE"
          NEW_VER="${MA}.${MI}.$((PA + 1))"
          printf '%s\n' "$NEW_VER" > VERSION

          BRANCH="bot/vercel-expiry-${{ github.run_id }}"
          git config user.name "kdf-rotation-bot"
          git config user.email "rotation-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add scripts/secret_registry.json VERSION
          git commit -m "chore(secrets): record rotated VERCEL_DEPLOYMENT_TOKEN expiry"
          git push origin "$BRANCH"

          # Close older still-open expiry-bump PRs (matched by branch prefix) so they don't pile up.
          # Runs before `pr create`, and the new branch has no PR yet, so it is never matched here.
          for n in $(gh pr list --state open --json number,headRefName \
                       --jq '.[] | select(.headRefName | startswith("bot/vercel-expiry-")) | .number'); do
            gh pr close "$n" --delete-branch --comment "Superseded by a newer expiry-bump PR." || true
          done

          PR_URL="$(gh pr create --base main --head "$BRANCH" \
            --title "chore(secrets): record rotated VERCEL_DEPLOYMENT_TOKEN expiry" \
            --body "Automated by **Rotate Vercel Deployment Token**. The shared \`VERCEL_DEPLOYMENT_TOKEN\` was just re-minted (45-day life); this stamps the new \`check.expiry\` into \`scripts/secret_registry.json\` so the weekly monitor stays accurate (and trips as a watchdog if the cron ever stops). VERSION bumped to \`${NEW_VER}\`. No secret values are touched — review and merge.")"
          echo "Opened $PR_URL"
          # Cosmetic, best-effort (don't fail the run if the label/assignee can't be applied):
          gh pr edit "$PR_URL" --add-label ops --add-assignee Needless2Say || true
