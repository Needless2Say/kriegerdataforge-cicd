name: Rotate Vercel Tokens

on:
  # Monthly auto-rotation: first of every month at 09:00 UTC. New Vercel tokens are created with a
  # 45-day expiry, so a monthly cadence (worst-case 31-day gap) leaves ~2 weeks of slack — a single
  # missed run never expires the one shared deploy token. This rotates the shared deploy token
  # (VERCEL_TOKEN, fanned out to every app repo) and the separate terraform management token
  # (VERCEL_API_TOKEN).
  schedule:
    - cron: "0 9 1 * *"

  # allow manual trigger — optionally scope to just one of the two Vercel secrets
  workflow_dispatch:
    inputs:
      secrets:
        description: "Which Vercel secret(s) to rotate."
        required: false
        default: "VERCEL_TOKEN,VERCEL_API_TOKEN"
        type: choice
        options:
          - "VERCEL_TOKEN,VERCEL_API_TOKEN"
          - "VERCEL_TOKEN"
          - "VERCEL_API_TOKEN"

permissions:
  contents: read

jobs:
  authorize:
    # Only dispatched runs have a human actor to authorize. A scheduled (cron) run's
    # github.triggering_actor is the last editor/enabler of the schedule, NOT necessarily the owner,
    # so gating the cron on the owner check would fail-closed and silently skip the rotation —
    # eventually expiring the one shared deploy token. Gate dispatches only (same as distribute-kit).
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_authorize-owner.yml

  rotate:
    name: Rotate Vercel tokens
    needs: authorize
    # Fail-closed owner gate for dispatches (PL-076 parity); the read-only/trusted cron path has no
    # authorize job (skipped), so allow it through. always() lets this job evaluate even when
    # authorize is skipped on schedule; the explicit success() check preserves fail-closed on dispatch.
    if: >-
      always() &&
      github.repository == 'Needless2Say/kriegerdataforge-cicd' &&
      (github.event_name != 'workflow_dispatch' ||
        (needs.authorize.result == 'success' && needs.authorize.outputs.authorized == 'true'))
    runs-on: ubuntu-slim

    # No GitHub Environment — uses repo-level secrets only
    # VERCEL_MASTER_TOKEN and CICD_PAT are stored as repo-level secrets
    # on kriegerdataforge-cicd (Settings → Secrets and variables → Actions)

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install rotation dependencies
        run: pip install -r scripts/requirements.txt

      # Short-lived GitHub App installation token (auto-revoked at job end; effective lifetime =
      # job runtime, not the 1-hour nominal TTL). Downscoped to environments:write — the VERCEL_TOKEN
      # environment secrets are gated by the "Environments" permission, NOT "Secrets". Gated on
      # USE_GITHUB_APP, falls back to CICD_PAT.
      - name: Mint GitHub App token
        id: app-token
        if: vars.USE_GITHUB_APP == 'true'
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.KDF_APP_ID }}
          private-key: ${{ secrets.KDF_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-environments: write

      - name: Rotate tokens
        env:
          VERCEL_MASTER_TOKEN: ${{ secrets.VERCEL_MASTER_TOKEN }}
          # Scopes minted tokens to the Vercel team (the VERCEL_ORG_ID value) — without it the tokens
          # are personal-scoped and Vercel rejects them for team projects.
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.CICD_PAT }}
          SECRETS_FILTER: ${{ inputs.secrets || 'VERCEL_TOKEN,VERCEL_API_TOKEN' }}
        run: |
          python scripts/rotate_secret.py \
            --mode generate \
            --secrets "$SECRETS_FILTER"
