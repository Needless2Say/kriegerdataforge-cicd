name: Rotate Vercel Tokens

on:
  # first of every month at 09:00 UTC
  # schedule:
  #   - cron: "0 9 1 * *"

  # allow manual trigger — optionally scope to specific apps and/or environments
  workflow_dispatch:
    inputs:
      apps:
        description: "App to rotate, or 'all' to rotate everything."
        required: false
        default: "all"
        type: choice
        options:
          - all
          - auth-backend
          - fitness-frontend
          - tiffanys-frontend
          - infra
      envs:
        description: "Environment to rotate, or 'all'."
        required: false
        default: "all"
        type: choice
        options:
          - all
          - prod
          - dev
          - infra

jobs:
  rotate:
    name: Rotate Vercel tokens
    runs-on: ubuntu-latest

    # No GitHub Environment — uses repo-level secrets only
    # VERCEL_MASTER_TOKEN and CICD_PAT are stored as repo-level secrets
    # on kriegerdataforge-cicd (Settings → Secrets and variables → Actions)

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install rotation dependencies
        run: pip install -r scripts/requirements.txt

      - name: Rotate tokens
        env:
          VERCEL_MASTER_TOKEN: ${{ secrets.VERCEL_MASTER_TOKEN }}
          GH_TOKEN: ${{ secrets.CICD_PAT }}
          APPS_FILTER: ${{ inputs.apps || 'all' }}
          ENVS_FILTER: ${{ inputs.envs || 'all' }}
        run: |
          python scripts/rotate_vercel_tokens.py \
            --apps "$APPS_FILTER" \
            --envs "$ENVS_FILTER"
