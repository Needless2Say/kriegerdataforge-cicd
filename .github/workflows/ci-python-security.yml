name: Python · Security (bandit + pip-audit)

on:
  workflow_call:
    inputs:
      python_version:
        description: Python version to use
        type: string
        default: "3.13"
      bandit_paths:
        description: Space-separated paths to pass to bandit -r
        type: string
        default: "api/ scripts/ vercel_api/"
      needs_sdk_auth:
        description: Configure git credentials for the private SDK for pip-audit (requires GH_PACKAGES_PAT secret)
        type: boolean
        default: false

jobs:
  bandit:
    name: Bandit SAST
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: python -m bandit -r ${{ inputs.bandit_paths }} -ll --format txt

  pip-audit:
    name: pip-audit (CVE check)
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Configure private SDK access
        if: ${{ inputs.needs_sdk_auth }}
        env:
          GH_PACKAGES_PAT: ${{ secrets.GH_PACKAGES_PAT }}
        run: git config --global url."https://__token__:${GH_PACKAGES_PAT}@github.com/".insteadOf "https://github.com/"

      # The slim runner lacks libpq, so psycopg2 (built from source — it ships
      # no manylinux wheels) fails with "pg_config executable not found" when
      # pip-audit resolves requirements.txt. Provide the build dependency.
      - name: Install libpq (psycopg2 build dependency)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libpq-dev

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit requirements.txt
        run: python -m pip_audit -r requirements.txt
