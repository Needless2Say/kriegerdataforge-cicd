name: Python · Security (bandit + pip-audit)

# N3b: least-privilege — read-only reusable security lane (bandit + pip-audit; no
# SARIF upload, so no security-events: write needed). Cap the GITHUB_TOKEN.
permissions:
  contents: read

on:
  workflow_call:
    inputs:
      python_version:
        description: Python version to use
        type: string
        default: "3.14"
      bandit_paths:
        description: Space-separated paths to pass to bandit -r
        type: string
        default: "api/ scripts/ vercel_api/"
      needs_sdk_auth:
        description: Configure git credentials for the private packages for pip-audit (App installation token when the caller sets USE_GITHUB_APP, else the GH_PACKAGES_PAT secret)
        type: boolean
        default: false

jobs:
  bandit:
    name: Bandit SAST
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: python -m bandit -r ${{ inputs.bandit_paths }} -ll --format txt

  pip-audit:
    name: pip-audit (CVE check)
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ inputs.python_version }}

      # Private-package auth is App-token-first (reports-ecosystem epic W2.5, ADR D-010): when
      # the calling repo opted in (USE_GITHUB_APP variable) and holds the distributed App
      # credentials (ops:distribute-app-secrets), mint a short-lived installation token —
      # contents: read only, auto-revoked at job end — for the pip git+https installs. Skipped
      # (not failed) when the caller never opted in; the next step then falls back to the
      # long-lived GH_PACKAGES_PAT exactly as before.
      - name: Mint GitHub App token for private-package installs
        id: pkg-token
        if: ${{ inputs.needs_sdk_auth && vars.USE_GITHUB_APP == 'true' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.KDF_APP_ID }}
          private-key: ${{ secrets.KDF_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: read

      - name: Configure private SDK access
        if: ${{ inputs.needs_sdk_auth }}
        env:
          PKG_INSTALL_TOKEN: ${{ steps.pkg-token.outputs.token || secrets.GH_PACKAGES_PAT }}
        run: git config --global url."https://__token__:${PKG_INSTALL_TOKEN}@github.com/".insteadOf "https://github.com/"

      # The slim runner lacks libpq, so psycopg2 (built from source — it ships
      # no manylinux wheels) fails with "pg_config executable not found" when
      # pip-audit resolves requirements.txt. Provide the build dependency.
      - name: Install libpq (psycopg2 build dependency)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libpq-dev

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit requirements.txt
        run: python -m pip_audit -r requirements.txt
