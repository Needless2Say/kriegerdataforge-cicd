name: Check Secret Expiry

# Weekly monitor for CI-plane credential expiry. Runs `rotate_secret.py --mode check --secrets all`
# (reads only the registry's expiry metadata — no secret values) and keeps ONE deduplicated tracking
# issue (label: ops:secret-expiry) open until everything is healthy:
#   * near/at expiry  -> create the issue (or update the existing one) listing what to rotate
#   * all healthy     -> auto-close the open issue
#
# The auto-mintable Vercel tokens self-heal via "Rotate Vercel Tokens". The GitHub PATs and the Vercel
# master token can't be minted via API, so this issue is the monthly nudge to rotate them by hand —
# recipes in docs/guides/SECRET_ROTATION.md §8.

on:
  schedule:
    - cron: "0 9 * * 1" # every Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    name: Check secret expiry
    runs-on: ubuntu-slim
    env:
      GH_TOKEN: ${{ github.token }}
      LABEL: "ops:secret-expiry"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run expiry check
        id: check
        run: |
          set +e
          python scripts/rotate_secret.py --mode check --secrets all | tee check.out
          rc=${PIPESTATUS[0]}
          set -e
          needs="$(grep -E '^NEEDS_ROTATION: ' check.out | sed 's/^NEEDS_ROTATION: //')"
          {
            echo "needs=$needs"
            echo "rc=$rc"
          } >> "$GITHUB_OUTPUT"

      - name: Open / update / close the tracking issue
        env:
          NEEDS: ${{ steps.check.outputs.needs }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh label create "$LABEL" --color FBCA04 --description "A monitored secret is near/at expiry" 2>/dev/null || true
          existing="$(gh issue list --repo "$REPO" --label "$LABEL" --state open --json number --jq '.[0].number // empty')"

          if [ -n "$NEEDS" ]; then
            {
              echo "## Secret(s) due for rotation"
              echo
              echo "The weekly expiry monitor flagged these credentials:"
              echo
              grep -E 'WARNING|EXPIRED|ERROR' check.out | sed 's/^ *//; s/^/- /' || true
              echo
              echo "**What to do:** follow the matching recipe in [\`docs/guides/SECRET_ROTATION.md\`](docs/guides/SECRET_ROTATION.md) §8."
              echo "- GitHub PATs (\`CICD_PAT\`, \`GH_PACKAGES_PAT\`) and the Vercel master token are **rotated by hand** — GitHub/Vercel can't mint them via API."
              echo "- The shared \`VERCEL_DEPLOYMENT_TOKEN\` auto-rotates via the **Rotate Vercel Deployment Token** workflow (no action needed)."
              echo
              echo "After rotating, update that secret's \`check.expiry\` in \`scripts/secret_registry.json\` and commit — **this issue auto-closes** once the next weekly check is clean."
              echo
              echo "_Monitor run: ${RUN_URL}. No secret values are read or shown._"
            } > issue.md
            if [ -n "$existing" ]; then
              gh issue edit "$existing" --repo "$REPO" --body-file issue.md
              echo "Updated existing tracking issue #$existing"
            else
              gh issue create --repo "$REPO" \
                --title "[Ops] Secret(s) due for rotation: ${NEEDS}" \
                --label "$LABEL" --label ops --assignee Needless2Say \
                --body-file issue.md
            fi
          else
            if [ -n "$existing" ]; then
              gh issue close "$existing" --repo "$REPO" \
                --comment "All monitored secrets are within their expiry windows ✅ (auto-closed by the expiry monitor)."
              echo "Closed tracking issue #$existing"
            else
              echo "All monitored secrets healthy; no open tracking issue."
            fi
          fi
