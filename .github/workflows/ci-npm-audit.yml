name: Node.js · npm audit

on:
  workflow_call:
    inputs:
      node_version:
        description: Node.js version to use
        type: string
        default: "22"

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Install dependencies
        env:
          # Private GH-Packages npm auth (reports-ecosystem epic W3.5): consumers that
          # depend on @needless2say/* commit an .npmrc interpolating ${GH_NPM_TOKEN} — a
          # CLASSIC read:packages PAT (GH Packages rejects fine-grained PATs and App
          # installation tokens). Always exported; empty for token-less consumers.
          GH_NPM_TOKEN: ${{ secrets.GH_NPM_TOKEN }}
        run: npm ci

      - name: Audit for high/critical CVEs
        # Fails only on high or critical vulnerabilities in production
        # dependencies. Dev-only packages are excluded via --omit=dev.
        run: make ci-npm-audit
