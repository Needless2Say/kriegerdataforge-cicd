name: Node.js · npm audit

on:
  workflow_call:
    inputs:
      node_version:
        description: Node.js version to use
        type: string
        default: "22"

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit for high/critical CVEs
        # Fails only on high or critical vulnerabilities in production
        # dependencies. Dev-only packages are excluded via --omit=dev.
        run: make ci-npm-audit
