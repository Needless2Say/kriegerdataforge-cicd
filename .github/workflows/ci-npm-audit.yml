name: Node.js · npm audit

on:
  workflow_call:
    inputs:
      node_version:
        description: Node.js version to use
        type: string
        default: "22"

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit for high/critical CVEs
        # Fails only on high or critical vulnerabilities in production
        # dependencies. Dev-only packages are excluded via --omit=dev.
        run: make ci-npm-audit
