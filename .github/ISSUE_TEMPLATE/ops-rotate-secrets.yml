name: "Ops · Rotate a secret"
description: "Owner-only: rotate GH_PACKAGES_PAT or per-app Vercel tokens across the ecosystem."
title: "[Ops] Rotate secret: "
labels:
  - ops
assignees:
  - Needless2Say

body:
  - type: markdown
    attributes:
      value: |
        ## Rotate a secret
        Fill in the fields, submit, then **add the `ops:rotate-secrets` label** to run.
        Only the repository owner can actually run it (the workflow fails closed otherwise).
        The full output stays in the (secret-masked) Actions run; this issue gets a sanitized summary.

        - **GH_PACKAGES_PAT** — GitHub can't generate PATs, so this is *owner-supplied*: first create
          the new fine-grained PAT and store it in the **`GH_PACKAGES_PAT_NEW`** repo secret, then run
          `rotate`. `check` reports the current PAT's expiry. (The Apps/Envs fields below are ignored.)
        - **Vercel tokens** — *auto-generated* via the Vercel API. Pick Apps/Envs (blank = all).
          `check` is not supported for Vercel — choose `rotate`.

  - type: dropdown
    id: target
    attributes:
      label: Target
      description: "Which secret to rotate."
      options:
        - GH_PACKAGES_PAT
        - Vercel tokens
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      description: "check = report only (GH_PACKAGES_PAT only) · rotate = perform the rotation"
      options:
        - check
        - rotate
    validations:
      required: true

  - type: dropdown
    id: vercel_apps
    attributes:
      label: Vercel apps
      description: "Vercel only. Multi-select; pick ALL or any subset. Ignored for GH_PACKAGES_PAT."
      multiple: true
      options:
        - ALL
        - auth-backend
        - fitness-frontend
        - tiffanys-frontend
        - infra
    validations:
      required: false

  - type: dropdown
    id: vercel_envs
    attributes:
      label: Vercel envs
      description: "Vercel only. Multi-select; pick ALL or any subset. Ignored for GH_PACKAGES_PAT."
      multiple: true
      options:
        - ALL
        - prod
        - dev
        - infra
    validations:
      required: false

  - type: dropdown
    id: confirm
    attributes:
      label: Confirm
      description: "Rotation writes LIVE credentials. This must be 'Yes' for mode = rotate."
      options:
        - "No — do not run"
        - "Yes — rotate live credentials"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ▶ **To run:** add the **`ops:rotate-secrets`** label to this issue. Re-add it to re-run.
