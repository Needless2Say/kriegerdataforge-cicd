name: "Ops · Rotate a secret"
description: "Owner-only: rotate CI-plane secrets (GitHub Actions secrets / non-Terraform Vercel vars) across the ecosystem."
title: "[Ops] Rotate secret: "
labels:
  - ops
assignees:
  - Needless2Say

body:
  - type: markdown
    attributes:
      value: |
        ## Rotate a CI-plane secret
        Fill in the fields, submit, then **add the `ops:rotate-secrets` label** to run.
        Only the repository owner can run it (the workflow fails closed otherwise). The full
        output stays in the (secret-masked) Actions run; this issue gets a metadata-only summary.

        **Modes**
        - **check** — report time-to-expiry for tracked secrets (e.g. `GH_PACKAGES_PAT`). Reads nothing live.
        - **generate** — auto-mint fresh value(s) and write them everywhere. `VERCEL_DEPLOYMENT_TOKEN`
          mints ONE shared Vercel token written (as a **repository** secret) to every app repo **and**
          the terraform repo (deploy + manage).
        - **paste** — distribute an **owner-supplied** value. **First** store the value in the
          **`SECRET_VALUE_NEW`** repo secret (Settings → Secrets and variables → Actions), then select
          one secret + `paste`. **Never type a secret value into this issue** — this repo is public.

        > **One value, repository-level.** `GH_PACKAGES_PAT` and `VERCEL_DEPLOYMENT_TOKEN` are each a
        > single global token, stored as **repository** secrets (no environment). Rotation also deletes
        > any leftover per-environment copies (they would shadow the repo value). There is no
        > environment to pick.

        > **Scope: CI-plane only.** App secrets owned by Terraform (DB URLs, the RS256 keypair,
        > `KDF_SERVICE_KEY`, `STRIPE_*`, OIDC client secrets, `CRON_SECRET`, …) are **not** rotated
        > here — use the terraform `SECRETS_ROTATION` runbook. The engine refuses Terraform-managed entries.

  - type: dropdown
    id: secrets
    attributes:
      label: Secret(s)
      description: "Which secret(s) to act on. Multi-select for generate/check. Paste = pick exactly one."
      multiple: true
      options:
        - ALL
        - GH_PACKAGES_PAT
        - VERCEL_DEPLOYMENT_TOKEN
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      description: "check = report only · generate = auto-mint new value(s) · paste = distribute a staged value"
      options:
        - check
        - generate
        - paste
    validations:
      required: true

  - type: dropdown
    id: confirm
    attributes:
      label: Confirm
      description: "generate/paste write LIVE credentials. This must be 'Yes' for those modes."
      options:
        - "No — do not run"
        - "Yes — write live credentials"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ▶ **To run:** add the **`ops:rotate-secrets`** label to this issue. Re-add it to re-run.
        For **paste**, set the `SECRET_VALUE_NEW` repo secret first; delete it afterward.
