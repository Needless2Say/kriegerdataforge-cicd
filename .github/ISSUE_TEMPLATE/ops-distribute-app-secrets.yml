name: "Ops · Distribute App secrets"
description: "Owner-only: copy the KDF GitHub App credentials to every consumer repo in the registry."
title: "[Ops] Distribute App secrets: "
labels:
  - ops
assignees:
  - Needless2Say

body:
  - type: markdown
    attributes:
      value: |
        ## Distribute the KDF App credentials to the consumer repos
        Copies this repo's `KDF_APP_ID` + `KDF_APP_PRIVATE_KEY` secrets to **every** target repo
        listed in `scripts/secret_registry.json` (the entries carrying `distribute_source_env`) —
        the copies power the E2E gate's App-token mint and the `ci-python-*` private-package
        install tokens. Owner-only — the backing workflow fails closed otherwise.

        **When to run**
        - After rotating the App **private key** (`SECRET_ROTATION.md` §8.3a) — the consumer
          copies are stale until re-distributed.
        - After **adding a consumer repo** to the registry's target list.
        - `check` any time: a read-only audit of which repos hold / lack the copies (names +
          timestamps only — the API cannot return values).

        > **Pre-org-move stopgap.** After an org move these become org secrets (visible to all
        > repos, no copies) — this flow is then obsolete and the registry's target list is the
        > cleanup checklist. Writes are idempotent; re-running converges.
        >
        > **Prerequisite** (already true for `ops:setup-e2e`): the KDF App holds repository
        > **Secrets: write** and is installed on the targets. Fallback: `CICD_PAT`.

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      description: "check = read-only audit (which targets lack the secrets); execute = write the copies."
      options:
        - check
        - execute
    validations:
      required: true

  - type: dropdown
    id: confirm
    attributes:
      label: Confirm
      description: "execute writes the App secrets to every registry target (required for execute; ignored for check)."
      options:
        - "No — do not run"
        - "Yes — write the App secrets to every registry target"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ▶ **To run:** add the **`ops:distribute-app-secrets`** label to this issue.
        Re-add the label to re-run (e.g. `check` → fix → `execute` → `check` on this same issue).
        The result is commented here; secret **values** never appear anywhere.
