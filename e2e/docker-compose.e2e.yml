# =============================================================================
# Self-contained Tier-2 E2E stack — CI-usable, no bind-mounts, no .env.local.
# =============================================================================
# The local dev stack (workspace-root docker-compose.yml + `make docker-up`) is
# NOT CI-usable: it bind-mounts each repo's source and reads secrets from each
# repo's gitignored .env.local. This file is the hermetic sibling — it BUILDS
# each service's image from source (dev target, source COPY'd in, no mounts) and
# takes every secret + coupling value via ${VAR} interpolation from the process
# environment, which the driver (ci_stack.py) populates with a freshly generated
# RSA keypair + fixed-per-run OIDC client creds. Nothing here depends on a
# developer's local checkout state.
#
# Bring it up with the driver (handles keygen, build, migrate, seed):
#   python e2e/ci_stack.py up          (or `make e2e-ci-up`)
# It is NOT meant to be run with a bare `docker compose up` — the ${VAR}s would
# be empty. See e2e/README.md → "Self-contained CI stack".
#
# TOPOLOGY (mirrors the proven-green local stack's issuer/URL wiring exactly):
#   browser → fitness-fe :3000 ─(gated)→ auth-UI :3002 (issuer origin)
#     login/consent → hub (back-channel kdf-api:8000) → fitness-fe callback
#       → token exchange (back-channel kdf-auth-ui:3000) → /database (SSR from
#         fitness-app-api:8001). Issuer is http://localhost:3002 EVERYWHERE.
#
# Design choices (see the ground-truth map in the epic log):
#   * dev image targets — the production `runner`/standalone build breaks a
#     plain-http E2E (Secure cookies dropped, CSP upgrade-insecure-requests,
#     baked NEXT_PUBLIC_*, serverEnv prod-guards). dev is what the local stack
#     and the proven harness use.
#   * MinIO omitted — not on the login→/database path (image upload is lazy);
#     dummy MINIO_* satisfy settings construction without a container.
#   * own compose-managed network (not the external `kdf-net`) — self-contained.
# =============================================================================

name: kriegerdataforge-e2e

services:
  # ───────────────────────────── Hub (identity provider) ────────────────────
  kdf-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kdf_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set by ci_stack.py}
    expose: ["5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kdf_db || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks: [e2e-net]

  kdf-api:
    build:
      context: ../../kriegerdataforge
      dockerfile: Dockerfile
      target: dev
      secrets:
        - gh_packages_pat
    # DNS name kdf-api → matches KDF_AUTH_INTERNAL_URL / KDF_AUTH_BASE_URL.
    environment:
      ENVIRONMENT: development
      DB_DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD}@kdf-db:5432/kdf_db
      AUTH_PRIVATE_KEY: ${AUTH_PRIVATE_KEY:?set by ci_stack.py}
      AUTH_PUBLIC_KEY: ${AUTH_PUBLIC_KEY:?set by ci_stack.py}
      AUTH_ALGORITHM: RS256
      AUTH_ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      AUTH_ADMIN_EMAIL: e2e-admin@example.com
      # SMTP is never exercised by the OIDC journey — placeholder, not a secret.
      AUTH_ADMIN_EMAIL_PASSWORD: e2e-smtp-unused
      AUTH_JWT_ISSUER: KriegerDataForge
      AUTH_JWT_AUDIENCE: KDFUsers
      # OIDC issuer origin = the browser-facing auth-UI (proven-green value).
      OIDC_ISSUER: http://localhost:3002
      OIDC_LOGIN_URL: http://localhost:3002/login
      OIDC_CONSENT_URL: http://localhost:3002/consent
      OIDC_SESSION_SECRET: ${OIDC_SESSION_SECRET:?set by ci_stack.py}
      OIDC_REQUIRE_SESSION_SECRET: "false"
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002
      # SERVICE_API_KEYS intentionally unset → ServiceKeyMiddleware disabled.
      # MinIO not deployed; dummies keep StorageSettings construction happy.
      MINIO_ENDPOINT: minio.invalid:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: kdf
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_URL: http://localhost:9002
    depends_on:
      kdf-db:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1 (not localhost): the app binds IPv4 0.0.0.0; localhost can
      # resolve to IPv6 ::1 in-container and the probe would be refused.
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/healthz || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 40
      start_period: 20s
    networks: [e2e-net]

  kdf-auth-ui:
    build:
      context: ../../kriegerdataforge-auth-ui
      dockerfile: Dockerfile
      target: dev
    # DNS name kdf-auth-ui → matches fitness-fe KDF_OIDC_INTERNAL_URL.
    ports:
      - "3002:3000" # browser-facing OIDC issuer origin (E2E_AUTH_UI_URL)
    environment:
      NODE_ENV: development
      ENVIRONMENT: development
      KDF_AUTH_INTERNAL_URL: http://kdf-api:8000
      OIDC_ISSUER: http://localhost:3002
      KDF_SERVICE_KEY: "" # blank — hub runs middleware disabled
    depends_on:
      kdf-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 10s
      timeout: 15s
      retries: 40
      start_period: 30s
    networks: [e2e-net]

  # ───────────────────────────── Fitness tenant (profile: fitness) ──────────
  fitness-app-db:
    profiles: ["fitness"]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fitness_app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set by ci_stack.py}
    expose: ["5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fitness_app_db || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks: [e2e-net]

  fitness-app-api:
    profiles: ["fitness"]
    build:
      context: ../../fitness-app-backend
      dockerfile: Dockerfile
      target: dev
      secrets:
        - gh_packages_pat
    # DNS name fitness-app-api → matches fitness-fe API_BASE_URL.
    environment:
      ENVIRONMENT: development
      DB_DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD}@fitness-app-db:5432/fitness_app_db
      KDF_AUTH_BASE_URL: http://kdf-api:8000
      KDF_JWT_ISSUER: http://localhost:3002
      # aud == the Fitness App client_id the hub seed inserts (per-client aud).
      KDF_JWT_AUDIENCE: ${E2E_OIDC_CLIENT_ID:?set by ci_stack.py}
      CORS_ORIGINS: http://localhost:3000,https://localhost:3000
      MINIO_ENDPOINT: minio.invalid:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: fitness-app-images
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_URL: http://localhost:9002
    depends_on:
      fitness-app-db:
        condition: service_healthy
      kdf-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8001/healthz || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 40
      start_period: 20s
    networks: [e2e-net]

  fitness-app-nextjs:
    profiles: ["fitness"]
    build:
      context: ../../fitness-app-frontend
      dockerfile: Dockerfile
      target: dev
      args:
        INSTALL_DEV: "true"
        NODE_ENV: development
    ports:
      - "3000:3000" # system-under-test entry point (E2E_BASE_URL); also the
        #             CSRF allowed-origin + OIDC redirect_uri host — must be :3000
    environment:
      NODE_ENV: development
      ENVIRONMENT: development
      API_BASE_URL: http://fitness-app-api:8001
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8001
      AUTH_PUBLIC_KEY: ${AUTH_PUBLIC_KEY}
      AUTH_ALGORITHM: RS256
      AUTH_FLOW: oidc
      KDF_OIDC_ISSUER: http://localhost:3002
      KDF_OIDC_INTERNAL_URL: http://kdf-auth-ui:3000
      KDF_OIDC_REDIRECT_URI: http://localhost:3000/api/auth/oidc/callback
      KDF_OIDC_CLIENT_ID: ${E2E_OIDC_CLIENT_ID}
      KDF_OIDC_CLIENT_SECRET: ${E2E_OIDC_CLIENT_SECRET:?set by ci_stack.py}
      KDF_SERVICE_KEY: "" # blank — fitness-be runs middleware disabled
    depends_on:
      fitness-app-api:
        condition: service_healthy
      kdf-auth-ui:
        condition: service_healthy
    healthcheck:
      # /login renders 200 without auth ( / 307-redirects to OIDC → poor probe).
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/login || exit 1"]
      interval: 10s
      timeout: 15s
      retries: 40
      start_period: 30s
    networks: [e2e-net]

  # ───────────────────────────── Tiffany's tenant (profile: tiffanys) ───────
  # Second tenant sharing the hub + auth-UI. OIDC-only (no AUTH_FLOW). FE :3001,
  # BE :8002. A distinct OIDC client (redirect :3001) is seeded by ci_stack.py.
  tiffanys-space-db:
    profiles: ["tiffanys"]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tiffanys_space_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set by ci_stack.py}
    expose: ["5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tiffanys_space_db || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks: [e2e-net]

  tiffanys-space-api:
    profiles: ["tiffanys"]
    build:
      context: ../../tiffanys-space-backend
      dockerfile: Dockerfile
      target: dev
      secrets:
        - gh_packages_pat
    # DNS name tiffanys-space-api → matches tiffanys-fe API_BASE_URL.
    environment:
      ENVIRONMENT: development
      DB_DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD}@tiffanys-space-db:5432/tiffanys_space_db
      KDF_AUTH_BASE_URL: http://kdf-api:8000
      KDF_JWT_ISSUER: http://localhost:3002
      # aud == the Tiffany's Space client_id the hub seed inserts (per-client aud).
      KDF_JWT_AUDIENCE: ${E2E_TIFFANYS_CLIENT_ID:?set by ci_stack.py}
      CORS_ORIGINS: http://localhost:3001,https://localhost:3001
      STRIPE_ENABLED: "false" # keep STRIPE_SECRET_KEY unrequired
      MINIO_ENDPOINT: minio.invalid:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: tiffanys-space-images
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_URL: http://localhost:9004
    depends_on:
      tiffanys-space-db:
        condition: service_healthy
      kdf-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8002/healthz || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 40
      start_period: 20s
    networks: [e2e-net]

  tiffanys-space-nextjs:
    profiles: ["tiffanys"]
    build:
      context: ../../tiffanys-space
      dockerfile: Dockerfile
      target: dev
      args:
        INSTALL_DEV: "true"
        NODE_ENV: development
    ports:
      - "3001:3000" # tiffanys system-under-test entry (E2E_TIFFANYS_BASE_URL);
        #             CSRF allowed-origin + OIDC redirect_uri host — must be :3001
    environment:
      NODE_ENV: development
      ENVIRONMENT: development
      API_BASE_URL: http://tiffanys-space-api:8002
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8002
      AUTH_PUBLIC_KEY: ${AUTH_PUBLIC_KEY}
      AUTH_ALGORITHM: RS256
      # NO AUTH_FLOW — tiffanys is unconditionally OIDC (unlike fitness). The stale
      # committed .env.local's legacy AUTH_ISSUER/AUDIENCE are intentionally NOT set
      # here (they would reject OIDC tokens); the proxy treats them as optional.
      KDF_OIDC_ISSUER: http://localhost:3002
      KDF_OIDC_INTERNAL_URL: http://kdf-auth-ui:3000
      KDF_OIDC_REDIRECT_URI: http://localhost:3001/api/auth/oidc/callback
      KDF_OIDC_CLIENT_ID: ${E2E_TIFFANYS_CLIENT_ID}
      KDF_OIDC_CLIENT_SECRET: ${E2E_TIFFANYS_CLIENT_SECRET:?set by ci_stack.py}
      KDF_SERVICE_KEY: "" # blank — tiffanys-be runs middleware disabled
    depends_on:
      tiffanys-space-api:
        condition: service_healthy
      kdf-auth-ui:
        condition: service_healthy
    healthcheck:
      # tiffanys /login 307-redirects to OIDC; /login?error=oidc renders 200
      # (the retry link) without auth — a valid liveness probe.
      test: ["CMD-SHELL", "wget -q -O /dev/null 'http://127.0.0.1:3000/login?error=oidc' || exit 1"]
      interval: 10s
      timeout: 15s
      retries: 40
      start_period: 30s
    networks: [e2e-net]

secrets:
  # Private-SDK token for the two Python image builds, sourced from the
  # GH_PACKAGES_PAT env var (ci_stack.py sets it) and mounted (tmpfs) into the
  # build — never an image layer or a build-log line.
  gh_packages_pat:
    environment: GH_PACKAGES_PAT

networks:
  e2e-net:
    name: kdf-e2e-net
    driver: bridge
