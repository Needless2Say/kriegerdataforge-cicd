# =============================================================================
# Tiffany's tenant fragment — merged onto docker-compose.shared.yml by ci_stack.py.
# =============================================================================
# A second tenant sharing the hub + auth-UI. OIDC-only (no AUTH_FLOW toggle).
# FE :3001, BE :8002. A distinct OIDC client (redirect :3001) is seeded by the
# driver. Owns ONLY tiffanys services; shared base comes from the shared compose.
#
# TRANSITIONAL LOCATION: cicd/e2e/tenants/tiffanys/ — Phase 2 relocates this to
# tiffanys-space/e2e/docker-compose.e2e.yml unchanged (ADR D-006).
services:
  tiffanys-space-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tiffanys_space_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set by ci_stack.py}
    expose: ["5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tiffanys_space_db || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks: [e2e-net]

  tiffanys-space-api:
    build:
      context: ${E2E_WORKSPACE:?set by ci_stack.py}/tiffanys-space-backend
      dockerfile: Dockerfile
      target: dev
      secrets:
        - gh_packages_pat
    # DNS name tiffanys-space-api → matches tiffanys-fe API_BASE_URL.
    environment:
      ENVIRONMENT: development
      DB_DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD}@tiffanys-space-db:5432/tiffanys_space_db
      KDF_AUTH_BASE_URL: http://kdf-api:8000
      KDF_JWT_ISSUER: http://localhost:3002
      # aud == the Tiffany's Space client_id the hub seed inserts (per-client aud).
      KDF_JWT_AUDIENCE: ${E2E_TIFFANYS_CLIENT_ID:?set by ci_stack.py}
      CORS_ORIGINS: http://localhost:3001,https://localhost:3001
      STRIPE_ENABLED: "false" # keep STRIPE_SECRET_KEY unrequired
      MINIO_ENDPOINT: minio.invalid:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: tiffanys-space-images
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_URL: http://localhost:9004
    depends_on:
      tiffanys-space-db:
        condition: service_healthy
      kdf-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8002/healthz || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 40
      start_period: 20s
    networks: [e2e-net]

  tiffanys-space-nextjs:
    build:
      context: ${E2E_WORKSPACE:?set by ci_stack.py}/tiffanys-space
      dockerfile: Dockerfile
      target: dev
      args:
        INSTALL_DEV: "true"
        NODE_ENV: development
    ports:
      - "3001:3000" # tiffanys system-under-test entry (E2E_TIFFANYS_BASE_URL);
        #             CSRF allowed-origin + OIDC redirect_uri host — must be :3001
    environment:
      NODE_ENV: development
      ENVIRONMENT: development
      API_BASE_URL: http://tiffanys-space-api:8002
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8002
      AUTH_PUBLIC_KEY: ${AUTH_PUBLIC_KEY}
      AUTH_ALGORITHM: RS256
      # NO AUTH_FLOW — tiffanys is unconditionally OIDC (unlike fitness). The stale
      # committed .env.local's legacy AUTH_ISSUER/AUDIENCE are intentionally NOT set
      # here (they would reject OIDC tokens); the proxy treats them as optional.
      KDF_OIDC_ISSUER: http://localhost:3002
      KDF_OIDC_INTERNAL_URL: http://kdf-auth-ui:3000
      KDF_OIDC_REDIRECT_URI: http://localhost:3001/api/auth/oidc/callback
      KDF_OIDC_CLIENT_ID: ${E2E_TIFFANYS_CLIENT_ID}
      KDF_OIDC_CLIENT_SECRET: ${E2E_TIFFANYS_CLIENT_SECRET:?set by ci_stack.py}
      KDF_SERVICE_KEY: "" # blank — tiffanys-be runs middleware disabled
    depends_on:
      tiffanys-space-api:
        condition: service_healthy
      kdf-auth-ui:
        condition: service_healthy
    healthcheck:
      # tiffanys /login 307-redirects to OIDC; /login?error=oidc renders 200
      # (the retry link) without auth — a valid liveness probe.
      test: ["CMD-SHELL", "wget -q -O /dev/null 'http://127.0.0.1:3000/login?error=oidc' || exit 1"]
      interval: 10s
      timeout: 15s
      retries: 40
      start_period: 30s
    networks: [e2e-net]
